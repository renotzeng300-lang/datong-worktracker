<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>大同發展中心工作管理平台</title>
<style>
  :root{
    --bg:#F6F3EC;
    --surface:#FFFFFF;
    --ink:#2B2A28;
    --ink-soft:#71695F;
    --ink-faint:#A39B8E;
    --line:#E3DDCD;
    --accent:#2F6F62;
    --accent-ink:#1E4A40;
    --accent-soft:#E3EEE9;
    --warn:#C0612F;
    --warn-soft:#F5E4D7;
    --cat-admin:#4A6FA5;
    --cat-admin-soft:#E8EDF6;
    --cat-finance:#7A5B33;
    --cat-finance-soft:#F1E9DC;
    --cat-env:#A9802A;
    --cat-env-soft:#F4ECD9;
    --cat-pro:#2F6F62;
    --cat-pro-soft:#E3EEE9;
    --cat-rights:#7A4768;
    --cat-rights-soft:#F1E5ED;
    --cat-innov:#5E7F4E;
    --cat-innov-soft:#E9EFE3;
    --cat-other:#7A746A;
    --cat-other-soft:#EDEAE2;
    --radius:10px;
    --shadow:0 1px 2px rgba(43,42,40,.06), 0 4px 14px rgba(43,42,40,.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei","Helvetica Neue",-apple-system,sans-serif;
    font-size:14.5px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; letter-spacing:.01em;}
  #app{min-height:100vh;}
  a{color:var(--accent);}

  .app-header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg,var(--accent-ink),var(--accent));
    color:#F4F8F6;
    padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:34px; height:34px; border-radius:9px;
    background:#F4F8F6; color:var(--accent-ink);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:15px; flex:none;
  }
  .brand-text h1{font-size:15.5px; font-weight:700; margin:0;}
  .brand-text p{font-size:11.5px; margin:0; opacity:.78;}
  .user-chip{
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.22);
    border-radius:999px; padding:5px 8px 5px 14px;
    font-size:12.5px;
  }
  .user-chip b{font-weight:700;}
  .user-chip .role-tag{
    background:rgba(255,255,255,.92); color:var(--accent-ink);
    border-radius:999px; padding:2px 9px; font-size:11px; font-weight:700;
  }
  .user-chip button{
    border:none; background:rgba(255,255,255,.18); color:#fff;
    border-radius:999px; padding:5px 11px; font-size:12px; cursor:pointer;
  }
  .user-chip button:hover{background:rgba(255,255,255,.3);}

  .container{max-width:1180px; margin:0 auto; padding:22px 24px 80px;}
  .tabs{display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap;}
  .tab{
    padding:9px 16px; border-radius:999px; cursor:pointer;
    font-size:13.5px; font-weight:600; color:var(--ink-soft);
    border:1px solid transparent;
  }
  .tab:hover{background:var(--surface);}
  .tab.active{background:var(--surface); color:var(--accent-ink); border-color:var(--line); box-shadow:var(--shadow);}
  .tab .pill{
    display:inline-block; margin-left:6px; background:var(--warn); color:#fff;
    border-radius:999px; font-size:10.5px; padding:1px 6px; font-weight:700;
  }

  .panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}
  .section-title{font-size:15px; font-weight:700; margin:0 0 4px;}
  .section-sub{font-size:12.5px; color:var(--ink-soft); margin:0 0 16px;}

  .stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px;}
  .stat-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow);}
  .stat-card .num{font-size:26px; font-weight:800; font-family:ui-monospace,monospace;}
  .stat-card .lbl{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .stat-card.warn .num{color:var(--warn);}
  .stat-card.good .num{color:var(--accent-ink);}

  .cat-bars{padding:18px 20px;}
  .cat-row{display:flex; align-items:center; gap:12px; padding:8px 0;}
  .cat-row .cat-label{width:170px; font-size:12.8px; font-weight:600; flex:none; display:flex; align-items:center; gap:7px;}
  .cat-row .track{flex:1; height:9px; border-radius:6px; background:#EFEAE0; overflow:hidden;}
  .cat-row .fill{height:100%; border-radius:6px;}
  .cat-row .pct{width:46px; text-align:right; font-size:12px; font-family:ui-monospace,monospace; color:var(--ink-soft); flex:none;}
  .dot{width:9px; height:9px; border-radius:50%; flex:none; display:inline-block;}

  .filter-bar{display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap;}
  select, input[type=text], input[type=date], input[type=number], textarea{
    font-family:inherit; font-size:13px; padding:8px 10px;
    border:1px solid var(--line); border-radius:7px; background:#fff; color:var(--ink);
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--accent); outline-offset:1px;}
  .btn{
    border:1px solid var(--line); background:#fff; color:var(--ink);
    padding:8px 14px; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .btn:hover{border-color:var(--accent);}
  .btn-primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  .btn-primary:hover{background:var(--accent-ink); border-color:var(--accent-ink);}
  .btn-warn{background:var(--warn); border-color:var(--warn); color:#fff;}
  .btn-ghost{background:transparent; border-color:transparent; color:var(--ink-soft);}
  .btn-ghost:hover{color:var(--ink);}
  .btn-sm{padding:5px 10px; font-size:12px;}
  .spacer{flex:1;}

  .task-list{display:flex; flex-direction:column; gap:10px;}
  .task-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden;
  }
  .task-head{display:flex; gap:14px; align-items:center; padding:14px 16px; cursor:pointer;}
  .cat-stripe{width:5px; align-self:stretch; border-radius:4px; flex:none;}
  .task-main{flex:1; min-width:0;}
  .task-title-row{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .task-title{font-weight:700; font-size:14.3px;}
  .cat-badge{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px;}
  .task-meta{display:flex; gap:14px; margin-top:5px; font-size:12px; color:var(--ink-soft); flex-wrap:wrap;}
  .task-meta span{display:flex; align-items:center; gap:4px;}
  .status-badge{font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; flex:none; white-space:nowrap;}
  .ring-wrap{flex:none; position:relative; width:44px; height:44px;}
  .ring-pct{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; font-family:ui-monospace,monospace;}
  .overdue-flag{
    background:var(--warn); color:#fff; font-size:10.5px; font-weight:700;
    padding:2px 8px; border-radius:999px; flex:none; white-space:nowrap;
  }
  .review-flag{
    font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; flex:none; white-space:nowrap;
  }
  .chev{flex:none; color:var(--ink-faint); font-size:13px; transition:transform .15s;}
  .task-card.open .chev{transform:rotate(90deg);}

  .task-body{display:none; border-top:1px solid var(--line); padding:16px 18px; background:#FBFAF7;}
  .task-card.open .task-body{display:block;}
  .body-grid{display:grid; grid-template-columns:1.4fr 1fr; gap:20px;}
  @media (max-width:860px){ .body-grid{grid-template-columns:1fr;} .stat-grid{grid-template-columns:repeat(2,1fr);} .id-options{grid-template-columns:repeat(2,1fr) !important;} }

  .log-list{display:flex; flex-direction:column; gap:8px; max-height:240px; overflow-y:auto; padding-right:4px; margin-bottom:10px;}
  .log-entry{background:#fff; border:1px solid var(--line); border-radius:8px; padding:9px 11px;}
  .log-entry .lhead{display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-soft); margin-bottom:3px; gap:8px;}
  .log-entry .lnote{font-size:13px; white-space:pre-wrap;}
  .field-label{font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:5px; display:block;}
  .field-block{margin-bottom:12px;}
  .row-2{display:flex; gap:10px;}
  .row-2>*{flex:1; min-width:0;}
  textarea{width:100%; min-height:64px; resize:vertical;}
  .director-box{background:var(--accent-soft); border:1px solid #CFE3DC; border-radius:8px; padding:12px;}
  .director-box .field-label{color:var(--accent-ink);}
  .small-note{font-size:11.5px; color:var(--ink-faint); margin-top:6px;}
  select.full, textarea.full, input.full{width:100%;}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(43,42,40,.45);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal{
    background:#fff; border-radius:14px; max-width:540px; width:100%;
    max-height:88vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .modal-head{padding:18px 22px 0; }
  .modal-head h2{font-size:17px; margin:0 0 2px;}
  .modal-head p{font-size:12.5px; color:var(--ink-soft); margin:0 0 14px;}
  .modal-body{padding:0 22px 22px;}
  .modal-foot{padding:14px 22px 20px; display:flex; gap:10px; justify-content:flex-end; border-top:1px solid var(--line);}
  .id-options{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;}
  .id-opt{border:1px solid var(--line); border-radius:8px; padding:10px 8px; text-align:center; font-size:13px; font-weight:600; cursor:pointer; background:#fff;}
  .id-opt.sel{border-color:var(--accent); background:var(--accent-soft); color:var(--accent-ink);}

  .empty{padding:50px 20px; text-align:center; color:var(--ink-soft);}
  .empty .big{font-size:30px; margin-bottom:6px;}

  #toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px; font-size:13px;
    opacity:0; transition:opacity .2s, transform .2s; z-index:100; pointer-events:none;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .activity-feed{display:flex; flex-direction:column; gap:10px; padding:18px 20px;}
  .activity-item{display:flex; gap:10px; font-size:12.8px; border-bottom:1px dashed var(--line); padding-bottom:9px;}
  .activity-item:last-child{border-bottom:none; padding-bottom:0;}
  .activity-item .a-time{color:var(--ink-faint); flex:none; font-family:ui-monospace,monospace; font-size:11px; width:80px;}
  .panel-pad{padding:18px 20px;}

  .header-actions{display:flex; align-items:center; gap:10px;}
  .export-btn{
    border:none; background:rgba(255,255,255,.18); color:#fff;
    border-radius:999px; padding:8px 16px; font-size:12.5px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .export-btn:hover{background:rgba(255,255,255,.3);}

  .ind-group{margin-bottom:20px;}
  .ind-group-title{display:flex; align-items:center; gap:8px; font-weight:700; font-size:13.5px; padding:4px 4px 10px;}
  .ind-table{width:100%; border-collapse:collapse; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);}
  .ind-table th{text-align:left; font-size:11.5px; color:var(--ink-soft); background:#FAF8F3; padding:8px 10px; border-bottom:1px solid var(--line); font-weight:700;}
  .ind-table td{padding:9px 10px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:top;}
  .ind-table tr:last-child td{border-bottom:none;}
  .ind-code{font-family:ui-monospace,monospace; font-weight:700; font-size:12.5px; white-space:nowrap;}
  .ind-tags{display:flex; gap:4px; flex-wrap:wrap; margin-top:4px;}
  .tag-core{background:#F5E4D7; color:#9C4A1F; font-size:10px; font-weight:700; padding:1px 6px; border-radius:999px;}
  .tag-new{background:#E3EEE9; color:#1E4A40; font-size:10px; font-weight:700; padding:1px 6px; border-radius:999px;}
  .tag-noscore{background:#EDEAE2; color:#6F6A5E; font-size:10px; font-weight:700; padding:1px 6px; border-radius:999px;}
  .ind-note{width:100%; min-height:34px; font-size:12px; padding:5px 7px;}
  .ind-checkbox{width:17px; height:17px; cursor:pointer;}
</style>
</head>

function indicatorTags(ind){
  let html = '';
  if(ind.isCore) html += '<span class="tag-core">核心指標</span>';
  if(ind.isNew) html += '<span class="tag-new">新增指標</span>';
  if(ind.noScore) html += '<span class="tag-noscore">不計分</span>';
  return html ? '<div class="ind-tags">'+html+'</div>' : '';
}
function matchIndicatorCode(text){
  if(!text) return '';
  const m = text.match(/(\d{4}(-[0-9A-Za-z]+)?)/);
  return m ? m[1].toUpperCase() : '';
}
function tasksForIndicator(code){
  return state.tasks.filter(function(t){ return matchIndicatorCode(t.indicator)===code.toUpperCase(); });
}
function indicatorStats(){
  let ready=0, withTask=0, coreTotal=0, coreReady=0;
  INDICATORS.forEach(function(ind){
    const c = state.indicatorChecklist[ind.code] || {};
    if(c.checked) ready++;
    if(tasksForIndicator(ind.code).length>0) withTask++;
    if(ind.isCore){ coreTotal++; if(c.checked) coreReady++; }
  });
  return {total:INDICATORS.length, ready:ready, withTask:withTask, coreTotal:coreTotal, coreReady:coreReady};
}


function catInfo(id){ return CATEGORIES.find(function(c){return c.id===id;}) || CATEGORIES[CATEGORIES.length-1]; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
function isOverdue(t){
  if(t.status==='已完成') return false;
  if(!t.reminderDate) return false;
  return t.reminderDate <= todayStr();
}
function statusColor(s){
  if(s==='未開始') return {bg:'#EDEAE2', fg:'#6F6A5E'};
  if(s==='進行中') return {bg:'#E3EEE9', fg:'#1E4A40'};

  return {bg:'#F5E4D7', fg:'#9C4A1F'};
}
function reviewColor(s){

  if(s==='請補充說明') return {bg:'#F5E4D7', fg:'#9C4A1F'};

}

async function ensureSeedData(){
  try{
    const snap = await db.collection('tasks').limit(1).get();
    if(snap.empty){
      const seed = seedTasks();
      const batch = db.batch();
      seed.forEach(function(t){ batch.set(db.collection('tasks').doc(t.id), t); });
      await batch.commit();
    }
  }catch(e){ /* 種子資料建立失敗不影響後續使用，僅從空清單開始 */ }
  try{
    const rosterDoc = await db.collection('app').doc('roster').get();
    if(!rosterDoc.exists){ await db.collection('app').doc('roster').set({list: defaultRoster()}); }
  }catch(e){}
  try{
    const indDoc = await db.collection('app').doc('indicatorChecklist').get();
    if(!indDoc.exists){ await db.collection('app').doc('indicatorChecklist').set({}); }
  }catch(e){}
}

function attachListeners(){

/* ====================== 衍生計算 ====================== */
function visibleTasks(scope){
  let list = state.tasks.slice();
  if(scope==='mine' && state.currentUser){
    list = list.filter(function(t){ return t.assignee===state.currentUser.name; });
  }
  if(state.filter.category!=='all'){ list = list.filter(function(t){ return t.category===state.filter.category; }); }
  if(state.filter.assignee!=='all'){ list = list.filter(function(t){ return t.assignee===state.filter.assignee; }); }
  if(state.filter.status!=='all'){ list = list.filter(function(t){ return t.status===state.filter.status; }); }
  list.sort(function(a,b){
    const ao = isOverdue(a) ? 0 : 1;
    const bo = isOverdue(b) ? 0 : 1;
    if(ao!==bo) return ao-bo;
    return (a.endDate||'9999').localeCompare(b.endDate||'9999');
  });
  return list;
}
function computeStats(){
  const total = state.tasks.length;
  const done = state.tasks.filter(function(t){ return t.status==='已完成'; }).length;
  const inProgress = state.tasks.filter(function(t){ return t.status==='進行中'; }).length;
  const overdue = state.tasks.filter(isOverdue).length;
  return {total:total, done:done, inProgress:inProgress, overdue:overdue};
}
function categoryStats(){
  return CATEGORIES.map(function(c){
    const items = state.tasks.filter(function(t){ return t.category===c.id; });
    if(items.length===0) return {cat:c, count:0, avg:0};
    const avg = Math.round(items.reduce(function(s,t){ return s+(t.progress||0); },0)/items.length);
    return {cat:c, count:items.length, avg:avg};
  }).filter(function(x){ return x.count>0; });
}
function recentActivity(n){
  const items = [];
  state.tasks.forEach(function(t){
    t.logs.forEach(function(l){
      items.push({date:l.date, author:l.author, note:l.note, title:t.title, taskId:t.id});
    });
  });
  items.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
  return items.slice(0, n||8);
}

function findTask(id){ return state.tasks.find(function(t){ return t.id===id; }); }

function createTask(data){
  const ref = db.collection('tasks').doc();
  const t = {
    id: ref.id,
    category: data.category, title: data.title, indicator: data.indicator||'',
    assignee: data.assignee, role: data.role,
    startDate: data.startDate||todayStr(), endDate: data.endDate||'',
    progress: Number(data.progress)||0, status: data.status||'未開始',
    reminderDate: data.reminderDate||'',
    reviewStatus:'待審核', directorComment:'',
    createdBy: state.currentUser ? state.currentUser.name : '未知',
    createdAt: todayStr(),
    logs: [{date:todayStr(), author: state.currentUser?state.currentUser.name:'未知', note: data.note || '建立工作項目。', progress:Number(data.progress)||0, status:data.status||'未開始'}]
  };
  addToRoster(data.assignee, data.role);
  ref.set(t).then(function(){ showToast('已新增工作項目'); }).catch(function(err){ showToast('新增失敗：'+err.message, true); });
}
function addLog(taskId, note, progress, status){
  const t = findTask(taskId); if(!t) return;
  const logEntry = {date:todayStr(), author: state.currentUser?state.currentUser.name:'未知', note:note, progress:Number(progress), status:status};
  const newReviewStatus = (status==='已完成' && t.reviewStatus!=='已核可') ? '待審核' : t.reviewStatus;
  db.collection('tasks').doc(taskId).update({
    progress: Number(progress),
    status: status,
    reviewStatus: newReviewStatus,
    logs: firebase.firestore.FieldValue.arrayUnion(logEntry)
  }).then(function(){ showToast('已更新執行進度'); }).catch(function(err){ showToast('更新失敗：'+err.message, true); });
}
function setReview(taskId, reviewStatus, comment){
  const t = findTask(taskId); if(!t) return;
  const logEntry = {date:todayStr(), author:(state.currentUser?state.currentUser.name:'主任')+'（主任批示）', note:(reviewStatus + (comment? '：'+comment : '')), progress:t.progress, status:t.status};
  db.collection('tasks').doc(taskId).update({
    reviewStatus: reviewStatus,
    directorComment: comment,
    logs: firebase.firestore.FieldValue.arrayUnion(logEntry)
  }).then(function(){ showToast('已儲存主任批示'); }).catch(function(err){ showToast('儲存失敗：'+err.message, true); });
}
function setReminder(taskId, dateStr){
  db.collection('tasks').doc(taskId).update({reminderDate: dateStr})
    .then(function(){ showToast('已更新提醒日期'); })
    .catch(function(err){ showToast('更新失敗：'+err.message, true); });
}
function deleteTask(taskId){
  db.collection('tasks').doc(taskId).delete()
    .then(function(){ showToast('已刪除工作項目'); })
    .catch(function(err){ showToast('刪除失敗：'+err.message, true); });
}

    + '  <div class="stat-grid" style="padding:0 20px 18px; margin-bottom:0;">'

    + '</div>';

    + '  <div class="panel-pad" style="padding-bottom:4px;"><div class="section-title">最新執行動態</div><div class="section-sub">同仁登打的最新工作說明與進度更新</div></div>'

function renderTaskCard(t){
  const cat = catInfo(t.category);
  const open = state.openTaskId===t.id;
  const sc = statusColor(t.status);
  const circumference = 113.1;
  const offset = circumference * (1 - (t.progress||0)/100);
  const overdue = isOverdue(t);
  const isDirector = state.currentUser.role==='主任';
  const canEdit = isDirector || t.assignee===state.currentUser.name;

  let head = '<div class="task-head" data-action="toggle-task" data-id="'+t.id+'">'
    + '<div class="cat-stripe" style="background:'+cat.color+'"></div>'
    + '<div class="ring-wrap">'
    +   '<svg width="44" height="44" viewBox="0 0 44 44">'
    +     '<circle cx="22" cy="22" r="18" fill="none" stroke="#EFEAE0" stroke-width="4"></circle>'
    +     '<circle cx="22" cy="22" r="18" fill="none" stroke="'+cat.color+'" stroke-width="4" stroke-linecap="round" stroke-dasharray="'+circumference+'" stroke-dashoffset="'+offset+'" transform="rotate(-90 22 22)"></circle>'
    +   '</svg>'
    +   '<div class="ring-pct">'+(t.progress||0)+'%</div>'
    + '</div>'
    + '<div class="task-main">'
    +   '<div class="task-title-row">'
    +     '<span class="task-title">'+escapeHtml(t.title)+'</span>'
    +     (t.indicator? '<span class="cat-badge" style="background:'+cat.soft+'; color:'+cat.color+'">'+escapeHtml(t.indicator)+'</span>' : '')
    +   '</div>'
    +   '<div class="task-meta">'
    +     '<span>👤 '+escapeHtml(t.assignee)+'（'+escapeHtml(t.role)+'）</span>'
    +     '<span>🗓 '+ (t.startDate||'—') +' ～ '+ (t.endDate||'未定') +'</span>'
    +     (t.reminderDate? '<span>⏰ 提醒：'+t.reminderDate+'</span>' : '')
    +   '</div>'
    + '</div>'
    + (overdue? '<span class="overdue-flag">逾期待辦</span>' : '')
    + '<span class="review-flag" style="background:'+reviewColor(t.reviewStatus).bg+'; color:'+reviewColor(t.reviewStatus).fg+'">'+t.reviewStatus+'</span>'
    + '<span class="status-badge" style="background:'+sc.bg+'; color:'+sc.fg+'">'+t.status+'</span>'
    + '<span class="chev">▶</span>'
    + '</div>';

  let body = '<div class="task-body"><div class="body-grid">';

  // 左：執行紀錄
  body += '<div>'
    + '<label class="field-label">執行情形紀錄</label>'
    + '<div class="log-list">'
    +   t.logs.slice().reverse().map(function(l){
          return '<div class="log-entry"><div class="lhead"><span>'+escapeHtml(l.author)+'</span><span>'+l.date+' · 進度 '+l.progress+'% · '+l.status+'</span></div><div class="lnote">'+escapeHtml(l.note)+'</div></div>';
        }).join('')
    + '</div>';
  if(canEdit){
    body += '<form data-action="add-log" data-id="'+t.id+'">'
      + '<div class="field-block"><label class="field-label">登打本次執行說明</label><textarea name="note" placeholder="說明本次進度、遇到的問題或已完成事項…" required></textarea></div>'
      + '<div class="row-2">'
      +   '<div class="field-block"><label class="field-label">最新進度（%）</label><input class="full" type="number" name="progress" min="0" max="100" step="5" value="'+(t.progress||0)+'"></div>'
      +   '<div class="field-block"><label class="field-label">狀態</label><select class="full" name="status">'+STATUSES.map(function(s){ return '<option value="'+s+'"'+(t.status===s?' selected':'')+'>'+s+'</option>'; }).join('')+'</select></div>'
      + '</div>'
      + '<button class="btn btn-primary btn-sm" type="submit">送出更新</button>'
      + '</form>';
  } else {
    body += '<div class="small-note">僅負責人或主任可登打此項目的執行進度。</div>';
  }
  body += '</div>';

  // 右：主任批改 / 提醒設定
  body += '<div>';
  if(isDirector){
    body += '<div class="director-box">'
      + '<label class="field-label">主任批改</label>'
      + '<form data-action="review-task" data-id="'+t.id+'">'
      +   '<div class="field-block"><select class="full" name="reviewStatus">'+REVIEW_STATUSES.map(function(s){ return '<option value="'+s+'"'+(t.reviewStatus===s?' selected':'')+'>'+s+'</option>'; }).join('')+'</select></div>'
      +   '<div class="field-block"><textarea name="comment" placeholder="給同仁的備註或修改建議…">'+escapeHtml(t.directorComment||'')+'</textarea></div>'
      +   '<button class="btn btn-primary btn-sm" type="submit">儲存批示</button>'
      + '</form>'
      + (t.directorComment? '<div class="small-note">最近備註：'+escapeHtml(t.directorComment)+'</div>' : '')
      + '</div>'
      + '<form data-action="set-reminder" data-id="'+t.id+'" style="margin-top:12px;">'
      +   '<label class="field-label">設定提醒日期</label>'
      +   '<div class="row-2">'
      +     '<input class="full" type="date" name="reminderDate" value="'+(t.reminderDate||'')+'">'
      +     '<button class="btn btn-sm" type="submit">更新提醒</button>'
      +   '</div>'
      + '</form>'
      + '<button class="btn btn-ghost btn-sm" style="margin-top:14px;" data-action="delete-task" data-id="'+t.id+'">刪除此工作項目</button>';
  } else {
    body += '<div class="director-box"><label class="field-label">主任備註</label><div style="font-size:13px;">'+(t.directorComment? escapeHtml(t.directorComment) : '<span class="small-note">尚無主任備註。</span>')+'</div></div>'
      + (t.reminderDate? '<div class="small-note" style="margin-top:10px;">主任設定的提醒日期：'+t.reminderDate+'</div>' : '');
  }
  body += '</div></div></div>';

  return '<div class="task-card'+(open?' open':'')+'" data-task-id="'+t.id+'">' + head + body + '</div>';
}

function renderReviewPanel(){

/* ====================== 指標對照表 ====================== */
function linkedCellHtml(code){
  const linked = tasksForIndicator(code);
  if(linked.length===0) return '<span class="small-note">尚無對應工作項目</span>';
  const names = linked.slice(0,2).map(function(t){ return escapeHtml(t.title); }).join('、');
  const more = linked.length>2 ? '　等共'+linked.length+'項' : '';
  return '<div>'+names+more+'</div>';
}
function renderIndicatorPanel(){
  const stats = indicatorStats();
  let html = '<div class="stat-grid">'
    + statCard(stats.total,'指標總數','')
    + statCard(stats.ready+'/'+stats.total,'資料已備妥','good')
    + statCard(stats.withTask+'/'+stats.total,'已建立對應工作項目','good')
    + statCard(stats.coreReady+'/'+stats.coreTotal,'核心指標達成','warn')
    + '</div>';

  html += '<div class="filter-bar">'
    + '<select data-action="ind-filter-category">'
    +   '<option value="all">全部評鑑面向</option>'
    +   CATEGORIES.map(function(c){ return '<option value="'+c.id+'"'+(state.indFilter.category===c.id?' selected':'')+'>'+c.label+'</option>'; }).join('')
    + '</select>'
    + '<select data-action="ind-filter-readiness">'
    +   '<option value="all">全部狀態</option>'
    +   '<option value="ready"'+(state.indFilter.readiness==='ready'?' selected':'')+'>已備妥</option>'
    +   '<option value="notReady"'+(state.indFilter.readiness==='notReady'?' selected':'')+'>尚未備妥</option>'
    +   '<option value="hasTask"'+(state.indFilter.readiness==='hasTask'?' selected':'')+'>已有對應工作項目</option>'
    +   '<option value="noTask"'+(state.indFilter.readiness==='noTask'?' selected':'')+'>尚無對應工作項目</option>'
    + '</select>'
    + '<label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);"><input type="checkbox" id="ind-core-only" '+(state.indFilter.core?'checked':'')+'> 只看核心指標</label>'
    + '<div class="spacer"></div>'
    + '<div class="small-note" style="max-width:260px;text-align:right;">勾選「已備妥」標記佐證資料已準備完成；點「＋建立工作」可直接為該指標建立追蹤項目</div>'
    + '</div>';

  let anyGroup = false;
  CATEGORIES.forEach(function(cat){
    if(state.indFilter.category!=='all' && cat.id!==state.indFilter.category) return;
    let items = INDICATORS.filter(function(ind){ return ind.category===cat.id; });
    if(state.indFilter.core) items = items.filter(function(ind){ return ind.isCore; });
    items = items.filter(function(ind){
      const c = state.indicatorChecklist[ind.code] || {};
      const hasTask = tasksForIndicator(ind.code).length>0;
      if(state.indFilter.readiness==='ready') return !!c.checked;
      if(state.indFilter.readiness==='notReady') return !c.checked;
      if(state.indFilter.readiness==='hasTask') return hasTask;
      if(state.indFilter.readiness==='noTask') return !hasTask;
      return true;
    });
    if(items.length===0) return;
    anyGroup = true;
    html += '<div class="ind-group">'
      + '<div class="ind-group-title"><span class="dot" style="background:'+cat.color+'"></span>'+cat.label+'（'+items.length+' 項）</div>'
      + '<table class="ind-table"><thead><tr>'
      +   '<th style="width:64px;">已備妥</th><th style="width:90px;">指標編號</th><th>指標名稱</th><th style="width:200px;">對應工作項目</th><th style="width:220px;">備註</th><th style="width:96px;">操作</th>'
      + '</tr></thead><tbody>'
      +   items.map(function(ind){
            const c = state.indicatorChecklist[ind.code] || {};
            return '<tr>'
              + '<td><input type="checkbox" class="ind-checkbox" data-action="ind-check" data-code="'+ind.code+'" '+(c.checked?'checked':'')+'></td>'
              + '<td class="ind-code">'+ind.code+'</td>'
              + '<td>'+escapeHtml(ind.title)+indicatorTags(ind)+'</td>'
              + '<td>'+linkedCellHtml(ind.code)+'</td>'
              + '<td><textarea class="ind-note" data-action="ind-note" data-code="'+ind.code+'" placeholder="備註／佐證資料存放位置…">'+escapeHtml(c.note||'')+'</textarea></td>'
              + '<td><button class="btn btn-sm" data-action="ind-new-task" data-code="'+ind.code+'">＋建立工作</button></td>'
              + '</tr>';
          }).join('')
      + '</tbody></table>'
      + '</div>';
  });
  if(!anyGroup){
    html += '<div class="panel"><div class="empty"><div class="big">🔍</div>找不到符合篩選條件的指標。</div></div>';
  }
  return html;
}

/* ====================== 匯出報表 ====================== */
function exportReport(){
  if(typeof XLSX==='undefined'){
    showToast('匯出元件尚在載入，請稍候幾秒再試一次', true);
    return;
  }
  try{
    const wb = XLSX.utils.book_new();

    const taskRows = state.tasks.map(function(t){
      const lastLog = t.logs[t.logs.length-1] || {};
      return {
        '評鑑面向': catInfo(t.category).label,
        '對應指標': t.indicator||'',
        '工作項目': t.title,
        '負責人': t.assignee,
        '角色': t.role,
        '開始日期': t.startDate||'',
        '預計完成日期': t.endDate||'',
        '進度(%)': t.progress,
        '狀態': t.status,
        '主任批示': t.reviewStatus,
        '主任備註': t.directorComment||'',
        '提醒日期': t.reminderDate||'',
        '最新執行說明': lastLog.note||'',
        '最新更新日期': lastLog.date||'',
        '建立人': t.createdBy,
        '建立日期': t.createdAt
      };
    });
    const ws1 = XLSX.utils.json_to_sheet(taskRows.length?taskRows:[{'提示':'目前尚無工作項目'}]);
    XLSX.utils.book_append_sheet(wb, ws1, '工作項目清單');

    const indRows = INDICATORS.map(function(ind){
      const c = state.indicatorChecklist[ind.code] || {};
      const linked = tasksForIndicator(ind.code);
      return {
        '指標編號': ind.code,
        '評鑑面向': catInfo(ind.category).label,
        '指標名稱': ind.title,
        '標籤': [ind.isCore?'核心指標':'', ind.isNew?'新增指標':'', ind.noScore?'不計分':''].filter(Boolean).join('、'),
        '資料已備妥': c.checked?'是':'否',
        '對應工作項目數': linked.length,
        '對應工作項目': linked.map(function(t){ return t.title; }).join('；'),
        '備註': c.note||''
      };
    });
    const ws2 = XLSX.utils.json_to_sheet(indRows);
    XLSX.utils.book_append_sheet(wb, ws2, '指標對照表');

    const catRows = categoryStats().map(function(c){
      return {'評鑑面向':c.cat.label, '工作項目數':c.count, '平均進度(%)':c.avg};
    });
    const ws3 = XLSX.utils.json_to_sheet(catRows.length?catRows:[{'評鑑面向':'尚無資料','工作項目數':0,'平均進度(%)':0}]);
    XLSX.utils.book_append_sheet(wb, ws3, '各面向進度彙總');

    XLSX.writeFile(wb, '大同發展中心工作管理報表_'+todayStr()+'.xlsx');
    showToast('已匯出報表');
  }catch(e){
    showToast('匯出失敗，請再試一次', true);
  }
}

/* ====================== 事件綁定 ====================== */
function bindGlobalEvents(){
  document.querySelectorAll('[data-action="tab"]').forEach(function(el){
    el.addEventListener('click', function(){ state.activeTab = el.getAttribute('data-tab'); state.openTaskId=null; render(); });
  });
  const switchBtn = document.querySelector('[data-action="switch-user"]');
  if(switchBtn) switchBtn.addEventListener('click', function(){ state.currentUser=null; saveCurrentUserToDevice(); render(); });

  const catSel = document.querySelector('[data-action="filter-category"]');
  if(catSel) catSel.addEventListener('change', function(){ state.filter.category = catSel.value; render(); });
  const assSel = document.querySelector('[data-action="filter-assignee"]');
  if(assSel) assSel.addEventListener('change', function(){ state.filter.assignee = assSel.value; render(); });
  const stSel = document.querySelector('[data-action="filter-status"]');
  if(stSel) stSel.addEventListener('change', function(){ state.filter.status = stSel.value; render(); });

  const newBtn = document.querySelector('[data-action="new-task-open"]');
  if(newBtn) newBtn.addEventListener('click', function(){ state.modal='newTask'; showNewTaskModal(); });

  const exportBtn = document.getElementById('export-report-btn');
  if(exportBtn) exportBtn.addEventListener('click', exportReport);

  const indCatSel = document.querySelector('[data-action="ind-filter-category"]');
  if(indCatSel) indCatSel.addEventListener('change', function(){ state.indFilter.category = indCatSel.value; render(); });
  const indReadySel = document.querySelector('[data-action="ind-filter-readiness"]');
  if(indReadySel) indReadySel.addEventListener('change', function(){ state.indFilter.readiness = indReadySel.value; render(); });
  const indCoreChk = document.getElementById('ind-core-only');
  if(indCoreChk) indCoreChk.addEventListener('change', function(){ state.indFilter.core = indCoreChk.checked; render(); });

  document.querySelectorAll('[data-action="ind-check"]').forEach(function(cb){
    cb.addEventListener('change', function(){
      const code = cb.getAttribute('data-code');
      const existing = state.indicatorChecklist[code] || {};
      const updated = Object.assign({}, existing, {checked: cb.checked});
      const fieldUpdate = {}; fieldUpdate[code] = updated;
      db.collection('app').doc('indicatorChecklist').set(fieldUpdate, {merge:true})
        .catch(function(err){ showToast('儲存失敗：'+err.message, true); });
    });
  });
  document.querySelectorAll('[data-action="ind-note"]').forEach(function(ta){
    ta.addEventListener('blur', function(){
      const code = ta.getAttribute('data-code');
      const existing = state.indicatorChecklist[code] || {};
      const updated = Object.assign({}, existing, {note: ta.value});
      const fieldUpdate = {}; fieldUpdate[code] = updated;
      db.collection('app').doc('indicatorChecklist').set(fieldUpdate, {merge:true})
        .catch(function(err){ showToast('備註儲存失敗：'+err.message, true); });
    });
  });
  document.querySelectorAll('[data-action="ind-new-task"]').forEach(function(btn){
    btn.addEventListener('click', function(){
      const code = btn.getAttribute('data-code');
      const ind = INDICATORS.find(function(i){ return i.code===code; });
      if(!ind) return;
      showNewTaskModal({category:ind.category, indicator: ind.code+' '+ind.title, title:''});
    });
  });

  document.querySelectorAll('[data-action="toggle-task"]').forEach(function(el){
    el.addEventListener('click', function(){
      const id = el.getAttribute('data-id');
      state.openTaskId = (state.openTaskId===id) ? null : id;
      render();
    });
  });

  document.querySelectorAll('[data-action="add-log"]').forEach(function(form){
    form.addEventListener('submit', function(e){
      e.preventDefault();
      const id = form.getAttribute('data-id');
      const fd = new FormData(form);
      addLog(id, fd.get('note'), fd.get('progress'), fd.get('status'));
      showToast('已更新執行進度');
      render();
    });
  });

  document.querySelectorAll('[data-action="review-task"]').forEach(function(form){
    form.addEventListener('submit', function(e){
      e.preventDefault();
      const id = form.getAttribute('data-id');
      const fd = new FormData(form);
      setReview(id, fd.get('reviewStatus'), fd.get('comment'));
      showToast('已儲存主任批示');
      render();
    });
  });

  document.querySelectorAll('[data-action="set-reminder"]').forEach(function(form){
    form.addEventListener('submit', function(e){
      e.preventDefault();
      const id = form.getAttribute('data-id');
      const fd = new FormData(form);
      setReminder(id, fd.get('reminderDate'));
      showToast('已更新提醒日期');
      render();
    });
  });

  document.querySelectorAll('[data-action="delete-task"]').forEach(function(btn){
    btn.addEventListener('click', function(){
      if(confirm('確定要刪除此工作項目嗎？此動作無法復原。')){
        deleteTask(btn.getAttribute('data-id'));
        showToast('已刪除工作項目');
        render();
      }
    });
  });
}

/* ====================== 啟動流程 ====================== */
function renderSetupNeededScreen(){
  document.getElementById('app').innerHTML = ''
    + '<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">'
    + '<div class="modal" style="max-width:540px;">'
    + '  <div class="modal-head"><h2>尚未完成雲端設定</h2>'
    + '  <p>請依照「Firebase設定教學」文件申請好 Firebase 專案後，把這個檔案最上方設定區塊裡的 <b>FIREBASE_CONFIG</b> 換成您自己專案的金鑰，並把 <b>ACCESS_CODE</b> 改成您自訂的通行碼，存檔後重新整理頁面即可。</p></div>'
    + '</div></div>';
}
function renderAccessGate(){
  document.getElementById('app').innerHTML = ''
    + '<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">'
    + '  <div class="modal" style="max-width:420px;">'
    + '    <div class="modal-head"><h2>大同發展中心工作管理平台</h2><p>請輸入機構通行碼以繼續使用</p></div>'
    + '    <div class="modal-body">'
    + '      <input class="full" type="password" id="access-code-input" placeholder="請輸入通行碼" autofocus>'
    + '      <div class="small-note" id="access-error" style="color:var(--warn); margin-top:8px;"></div>'
    + '    </div>'
    + '    <div class="modal-foot"><button class="btn btn-primary" id="access-submit">進入系統</button></div>'
    + '  </div>'
    + '</div>';
  document.getElementById('access-submit').addEventListener('click', checkAccessCode);
  document.getElementById('access-code-input').addEventListener('keydown', function(e){
    if(e.key==='Enter'){ checkAccessCode(); }
  });
}
function checkAccessCode(){
  const v = document.getElementById('access-code-input').value;
  if(v===ACCESS_CODE){
    try{ localStorage.setItem('dt-access-granted','1'); }catch(e){}
    startApp();
  }else{
    document.getElementById('access-error').textContent = '通行碼錯誤，請再試一次。';
  }
}
function startApp(){
  document.getElementById('app').innerHTML = '<div class="empty">連線中…</div>';

  if(typeof firebase==='undefined'){
    document.getElementById('app').innerHTML = '<div class="empty">Firebase 程式庫載入失敗。<br><span class="small-note">這通常是瀏覽器擴充功能（如廣告或追蹤封鎖工具）、防毒軟體，或公司／機關網路擋掉了 www.gstatic.com 這個網域所造成。請嘗試：①暫時關閉廣告封鎖類擴充功能後重新整理頁面 ②換成手機行動網路或家用網路測試 ③換一台電腦或瀏覽器測試，確認是否與環境有關。</span></div>';
    return;
  }

  let settled = false;
  const timeoutId = setTimeout(function(){
    if(!settled){
      document.getElementById('app').innerHTML = '<div class="empty">連線逾時，伺服器沒有回應。<br><span class="small-note">請檢查網路連線是否正常，或是否有防火牆／公司網路阻擋了 Google Firebase 的連線（firebaseapp.com / googleapis.com / gstatic.com）。可以按 F12 開啟瀏覽器的「Console」分頁，查看是否有紅色錯誤訊息，並回報給系統管理人員協助排查。</span><br><button class="btn btn-sm" style="margin-top:10px;" onclick="location.reload()">重新整理頁面</button></div>';
    }
  }, 10000);

  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    const authRef = firebase.auth();
    db = firebase.firestore();
    authRef.onAuthStateChanged(function(user){
      settled = true;
      clearTimeout(timeoutId);
      if(user){
        document.getElementById('app').innerHTML = '<div class="empty">登入成功，正在連接資料庫…</div>';
        let dataSettled = false;
        const dataTimeoutId = setTimeout(function(){
          if(!dataSettled){
            document.getElementById('app').innerHTML = '<div class="empty">身分驗證成功，但資料庫連線逾時。<br><span class="small-note">這通常表示網路可以連到 Google 的登入服務，但「firestore.googleapis.com」這個雲端資料庫專用網域被防火牆／公司或機關網路擋住了。常見於機關內部網路。建議：①改用手機行動網路（關閉WiFi）測試是否能正常進入 ②請網管人員確認防火牆是否放行 firestore.googleapis.com 與 *.firebaseio.com。</span><br><button class="btn btn-sm" style="margin-top:10px;" onclick="location.reload()">重新整理頁面</button></div>';
          }
        }, 10000);
        ensureSeedData().then(function(){
          dataSettled = true;
          clearTimeout(dataTimeoutId);
          attachListeners();
          loadCurrentUserFromDevice();
          render();
        }).catch(function(err){
          dataSettled = true;
          clearTimeout(dataTimeoutId);
          document.getElementById('app').innerHTML = '<div class="empty">資料初始化失敗：'+escapeHtml(err.message)+'</div>';
        });
      }else{
        authRef.signInAnonymously().catch(function(err){
          document.getElementById('app').innerHTML = '<div class="empty">連線失敗：'+escapeHtml(err.message)+'<br><span class="small-note">請確認 Firebase 設定金鑰是否正確，並已在 Authentication 啟用「匿名」登入方式。</span></div>';
        });
      }
    }, function(err){
      settled = true;
      clearTimeout(timeoutId);
      document.getElementById('app').innerHTML = '<div class="empty">驗證連線失敗：'+escapeHtml(err.message)+'</div>';
    });
  }catch(e){
    settled = true;
    clearTimeout(timeoutId);
    document.getElementById('app').innerHTML = '<div class="empty">Firebase 初始化失敗：'+escapeHtml(e.message)+'<br><span class="small-note">請確認檔案最上方 FIREBASE_CONFIG 裡六個欄位的值都已正確填入。</span></div>';
  }
}
function boot(){
  if(isPlaceholderConfig()){ renderSetupNeededScreen(); return; }
  let granted = false;
  try{ granted = localStorage.getItem('dt-access-granted')==='1'; }catch(e){}
  if(granted){ startApp(); } else { renderAccessGate(); }
}
boot();
</script>
