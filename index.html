<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>大同發展中心工作管理平台</title>
<style>
  :root{
    --bg:#F6F3EC;
    --surface:#FFFFFF;
    --ink:#2B2A28;
    --ink-soft:#71695F;
    --ink-faint:#A39B8E;
    --line:#E3DDCD;
    --accent:#2F6F62;
    --accent-ink:#1E4A40;
    --accent-soft:#E3EEE9;
    --warn:#C0612F;
    --warn-soft:#F5E4D7;
    --cat-admin:#4A6FA5;
    --cat-admin-soft:#E8EDF6;
    --cat-finance:#7A5B33;
    --cat-finance-soft:#F1E9DC;
    --cat-env:#A9802A;
    --cat-env-soft:#F4ECD9;
    --cat-pro:#2F6F62;
    --cat-pro-soft:#E3EEE9;
    --cat-rights:#7A4768;
    --cat-rights-soft:#F1E5ED;
    --cat-innov:#5E7F4E;
    --cat-innov-soft:#E9EFE3;
    --cat-other:#7A746A;
    --cat-other-soft:#EDEAE2;
    --radius:10px;
    --shadow:0 1px 2px rgba(43,42,40,.06), 0 4px 14px rgba(43,42,40,.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei","Helvetica Neue",-apple-system,sans-serif;
    font-size:14.5px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; letter-spacing:.01em;}
  #app{min-height:100vh;}
  a{color:var(--accent);}

  .app-header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg,var(--accent-ink),var(--accent));
    color:#F4F8F6;
    padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:34px; height:34px; border-radius:9px;
    background:#F4F8F6; color:var(--accent-ink);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:15px; flex:none;
  }
  .brand-text h1{font-size:15.5px; font-weight:700; margin:0;}
  .brand-text p{font-size:11.5px; margin:0; opacity:.78;}
  .user-chip{
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.22);
    border-radius:999px; padding:5px 8px 5px 14px;
    font-size:12.5px;
  }
  .user-chip b{font-weight:700;}
  .user-chip .role-tag{
    background:rgba(255,255,255,.92); color:var(--accent-ink);
    border-radius:999px; padding:2px 9px; font-size:11px; font-weight:700;
  }
  .user-chip button{
    border:none; background:rgba(255,255,255,.18); color:#fff;
    border-radius:999px; padding:5px 11px; font-size:12px; cursor:pointer;
  }
  .user-chip button:hover{background:rgba(255,255,255,.3);}

  .container{max-width:1180px; margin:0 auto; padding:22px 24px 80px;}
  .tabs{display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap;}
  .tab{
    padding:9px 16px; border-radius:999px; cursor:pointer;
    font-size:13.5px; font-weight:600; color:var(--ink-soft);
    border:1px solid transparent;
  }
  .tab:hover{background:var(--surface);}
  .tab.active{background:var(--surface); color:var(--accent-ink); border-color:var(--line); box-shadow:var(--shadow);}
  .tab .pill{
    display:inline-block; margin-left:6px; background:var(--warn); color:#fff;
    border-radius:999px; font-size:10.5px; padding:1px 6px; font-weight:700;
  }

  .panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}
  .section-title{font-size:15px; font-weight:700; margin:0 0 4px;}
  .section-sub{font-size:12.5px; color:var(--ink-soft); margin:0 0 16px;}

  .stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px;}
  .stat-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow);}
  .stat-card .num{font-size:26px; font-weight:800; font-family:ui-monospace,monospace;}
  .stat-card .lbl{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .stat-card.warn .num{color:var(--warn);}
  .stat-card.good .num{color:var(--accent-ink);}

  .cat-bars{padding:18px 20px;}
  .cat-row{display:flex; align-items:center; gap:12px; padding:8px 0;}
  .cat-row .cat-label{width:170px; font-size:12.8px; font-weight:600; flex:none; display:flex; align-items:center; gap:7px;}
  .cat-row .track{flex:1; height:9px; border-radius:6px; background:#EFEAE0; overflow:hidden;}
  .cat-row .fill{height:100%; border-radius:6px;}
  .cat-row .pct{width:46px; text-align:right; font-size:12px; font-family:ui-monospace,monospace; color:var(--ink-soft); flex:none;}
  .dot{width:9px; height:9px; border-radius:50%; flex:none; display:inline-block;}

  .filter-bar{display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap;}
  select, input[type=text], input[type=date], input[type=number], textarea{
    font-family:inherit; font-size:13px; padding:8px 10px;
    border:1px solid var(--line); border-radius:7px; background:#fff; color:var(--ink);
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--accent); outline-offset:1px;}
  .btn{
    border:1px solid var(--line); background:#fff; color:var(--ink);
    padding:8px 14px; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .btn:hover{border-color:var(--accent);}
  .btn-primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  .btn-primary:hover{background:var(--accent-ink); border-color:var(--accent-ink);}
  .btn-warn{background:var(--warn); border-color:var(--warn); color:#fff;}
  .btn-ghost{background:transparent; border-color:transparent; color:var(--ink-soft);}
  .btn-ghost:hover{color:var(--ink);}
  .btn-sm{padding:5px 10px; font-size:12px;}
  .spacer{flex:1;}

  .task-list{display:flex; flex-direction:column; gap:10px;}
  .task-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden;
  }
  .task-head{display:flex; gap:14px; align-items:center; padding:14px 16px; cursor:pointer;}
  .cat-stripe{width:5px; align-self:stretch; border-radius:4px; flex:none;}
  .task-main{flex:1; min-width:0;}
  .task-title-row{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .task-title{font-weight:700; font-size:14.3px;}
  .cat-badge{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px;}
  .task-meta{display:flex; gap:14px; margin-top:5px; font-size:12px; color:var(--ink-soft); flex-wrap:wrap;}
  .task-meta span{display:flex; align-items:center; gap:4px;}
  .status-badge{font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; flex:none; white-space:nowrap;}
  .ring-wrap{flex:none; position:relative; width:44px; height:44px;}
  .ring-pct{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; font-family:ui-monospace,monospace;}
  .overdue-flag{
    background:var(--warn); color:#fff; font-size:10.5px; font-weight:700;
    padding:2px 8px; border-radius:999px; flex:none; white-space:nowrap;
  }
  .review-flag{
    font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; flex:none; white-space:nowrap;
  }
  .chev{flex:none; color:var(--ink-faint); font-size:13px; transition:transform .15s;}
  .task-card.open .chev{transform:rotate(90deg);}

  .task-body{display:none; border-top:1px solid var(--line); padding:16px 18px; background:#FBFAF7;}
  .task-card.open .task-body{display:block;}
  .body-grid{display:grid; grid-template-columns:1.4fr 1fr; gap:20px;}
  @media (max-width:860px){ .body-grid{grid-template-columns:1fr;} .stat-grid{grid-template-columns:repeat(2,1fr);} .id-options{grid-template-columns:repeat(2,1fr) !important;} }

  .log-list{display:flex; flex-direction:column; gap:8px; max-height:240px; overflow-y:auto; padding-right:4px; margin-bottom:10px;}
  .log-entry{background:#fff; border:1px solid var(--line); border-radius:8px; padding:9px 11px;}
  .log-entry-editing{background:var(--accent-soft); border-color:var(--accent);}
  .btn-link{background:none; border:none; padding:0; color:var(--accent); font-size:11.5px; font-weight:600; cursor:pointer; text-decoration:underline;}
  .btn-link:hover{color:var(--accent-ink);}
  .edited-tag{color:var(--warn); font-weight:700; margin-left:5px; font-size:10.5px;}
  .log-entry .lhead{display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-soft); margin-bottom:3px; gap:8px;}
  .log-entry .lnote{font-size:13px; white-space:pre-wrap;}
  .field-label{font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:5px; display:block;}
  .field-block{margin-bottom:12px;}
  .row-2{display:flex; gap:10px;}
  .row-2>*{flex:1; min-width:0;}
  textarea{width:100%; min-height:64px; resize:vertical;}
  .director-box{background:var(--accent-soft); border:1px solid #CFE3DC; border-radius:8px; padding:12px;}
  .director-box .field-label{color:var(--accent-ink);}
  .small-note{font-size:11.5px; color:var(--ink-faint); margin-top:6px;}
  select.full, textarea.full, input.full{width:100%;}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(43,42,40,.45);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal{
    background:#fff; border-radius:14px; max-width:540px; width:100%;
    max-height:88vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .modal-head{padding:18px 22px 0; }
  .modal-head h2{font-size:17px; margin:0 0 2px;}
  .modal-head p{font-size:12.5px; color:var(--ink-soft); margin:0 0 14px;}
  .modal-body{padding:0 22px 22px;}
  .modal-foot{padding:14px 22px 20px; display:flex; gap:10px; justify-content:flex-end; border-top:1px solid var(--line);}
  .id-options{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;}
  .id-opt{border:1px solid var(--line); border-radius:8px; padding:10px 8px; text-align:center; font-size:13px; font-weight:600; cursor:pointer; background:#fff;}
  .id-opt.sel{border-color:var(--accent); background:var(--accent-soft); color:var(--accent-ink);}

  .empty{padding:50px 20px; text-align:center; color:var(--ink-soft);}
  .empty .big{font-size:30px; margin-bottom:6px;}

  #toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px; font-size:13px;
    opacity:0; transition:opacity .2s, transform .2s; z-index:100; pointer-events:none;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .activity-feed{display:flex; flex-direction:column; gap:10px; padding:18px 20px;}
  .activity-item{display:flex; gap:10px; font-size:12.8px; border-bottom:1px dashed var(--line); padding-bottom:9px;}
  .activity-item:last-child{border-bottom:none; padding-bottom:0;}
  .activity-item .a-time{color:var(--ink-faint); flex:none; font-family:ui-monospace,monospace; font-size:11px; width:80px;}
  .panel-pad{padding:18px 20px;}

  .header-actions{display:flex; align-items:center; gap:10px;}
  .export-btn{
    border:none; background:rgba(255,255,255,.18); color:#fff;
    border-radius:999px; padding:8px 16px; font-size:12.5px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .export-btn:hover{background:rgba(255,255,255,.3);}

  .ind-group{margin-bottom:20px;}
  .ind-group-title{display:flex; align-items:center; gap:8px; font-weight:700; font-size:13.5px; padding:4px 4px 10px;}
  .ind-table{width:100%; border-collapse:collapse; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);}
  .ind-table th{text-align:left; font-size:11.5px; color:var(--ink-soft); background:#FAF8F3; padding:8px 10px; border-bottom:1px solid var(--line); font-weight:700;}
  .ind-table td{padding:9px 10px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:top;}
  .ind-table tr:last-child td{border-bottom:none;}
  .ind-code{font-family:ui-monospace,monospace; font-weight:700; font-size:12.5px; white-space:nowrap;}
  .ind-tags{display:flex; gap:4px; flex-wrap:wrap; margin-top:4px;}
  .tag-core{background:#F5E4D7; color:#9C4A1F; font-size:10px; font-weight:700; padding:1px 6px; border-radius:999px;}
  .tag-new{background:#E3EEE9; color:#1E4A40; font-size:10px; font-weight:700; padding:1px 6px; border-radius:999px;}
  .tag-noscore{background:#EDEAE2; color:#6F6A5E; font-size:10px; font-weight:700; padding:1px 6px; border-radius:999px;}
  .ind-note{width:100%; min-height:34px; font-size:12px; padding:5px 7px;}
  .ind-checkbox{width:17px; height:17px; cursor:pointer;}
  .ind-status{width:100%; font-size:12.5px; padding:5px 6px;}
  .ind-evidence{width:100%; font-size:12px; padding:5px 7px;}
  .core-warning{
    background:#FBEAD9; border:1px solid #E7B98A; color:#8A3F12;
    border-radius:var(--radius); padding:12px 16px; font-size:13.5px; font-weight:700;
    margin-bottom:16px;
  }
  .priority-badge{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; flex:none; white-space:nowrap;}
  .priority-高{background:#F5E4D7; color:#9C4A1F;}
  .priority-中{background:#EDEAE2; color:#6F6A5E;}
  .priority-低{background:#E9EFE3; color:#4F6B43;}
  .cycle-tag{font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:999px; background:#EDEAE2; color:#6F6A5E; flex:none; white-space:nowrap;}
  .activity-stale{color:var(--warn); font-weight:700;}
  .activity-row{display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px dashed var(--line); font-size:13px;}
  .activity-row:last-child{border-bottom:none;}
  .staff-board-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px; margin-bottom:20px;}
  .sb-card .panel-pad{padding:16px 18px;}
  .sb-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:10px;}
  .sb-who{display:flex; align-items:center; gap:10px; min-width:0;}
  .sb-avatar{width:36px; height:36px; border-radius:50%; background:var(--accent-soft); color:var(--accent-ink); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; flex:none;}
  .sb-name{font-size:14px; font-weight:700;}
  .sb-role{font-size:11.5px; color:var(--ink-soft);}
  .sb-task{margin-bottom:10px;}
  .sb-task:last-child{margin-bottom:0;}
  .sb-task-top{display:flex; justify-content:space-between; gap:8px; font-size:12.5px; margin-bottom:4px;}
  .sb-task-title{color:var(--ink); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .sb-task-pct{color:var(--ink-soft); font-family:ui-monospace,monospace; flex:none;}
  .draft-banner{
    background:var(--accent-soft); border:1px solid #CFE3DC; border-radius:8px;
    padding:8px 12px; font-size:12px; color:var(--accent-ink); margin-bottom:12px;
  }
  @media (max-width:760px){
    .ind-table thead{display:none;}
    .ind-table, .ind-table tbody, .ind-table tr, .ind-table td{display:block; width:100%;}
    .ind-table tr{border-bottom:6px solid var(--bg); padding:10px 4px;}
    .ind-table td{border-bottom:none; padding:6px 4px;}
    .ind-table td[data-label]::before{
      content:attr(data-label); display:block; font-size:10.5px; font-weight:700;
      color:var(--ink-faint); text-transform:uppercase; margin-bottom:3px;
    }
  }
</style>
</head>

/* ====================== 指標管理（主任可自行新增/編輯/停用，因應未來評鑑指標改版） ====================== */
function effectiveIndicators(){
  const ov = state.indicatorOverrides || {custom:[], hidden:[], edits:{}};
  const hidden = ov.hidden || [];
  const edits = ov.edits || {};
  const base = INDICATORS
    .filter(function(ind){ return hidden.indexOf(ind.code)===-1; })
    .map(function(ind){
      const e = edits[ind.code];
      return e ? Object.assign({}, ind, e) : ind;
    });
  const custom = (ov.custom || []).filter(function(ind){ return hidden.indexOf(ind.code)===-1; })
    .map(function(ind){
      const e = edits[ind.code];
      return e ? Object.assign({}, ind, e) : ind;
    });
  return base.concat(custom);
}
function isCustomIndicator(code){
  const ov = state.indicatorOverrides || {custom:[]};
  return (ov.custom||[]).some(function(i){ return i.code===code; });
}
async function saveIndicatorOverrides(){
  try{ await db.collection('app').doc('indicator-overrides').set(state.indicatorOverrides); }
  catch(e){ showToast('指標設定儲存失敗：'+e.message, true); }
}
function addCustomIndicator(data){
  const ov = state.indicatorOverrides || {custom:[], hidden:[], edits:{}};
  const code = (data.code||'').trim();
  if(!code){ showToast('請填寫指標編號', true); return false; }
  const exists = INDICATORS.some(function(i){return i.code===code;}) || (ov.custom||[]).some(function(i){return i.code===code;});
  if(exists){ showToast('此指標編號已存在，請改用編輯功能或更換編號', true); return false; }
  ov.custom = (ov.custom||[]).concat([{
    code:code, category:data.category, title:data.title,
    isCore: !!data.isCore, isNew: !!data.isNew, noScore: !!data.noScore
  }]);
  state.indicatorOverrides = ov;
  saveIndicatorOverrides();
  showToast('已新增指標項目');
  return true;
}
function editIndicator(code, fields){
  const ov = state.indicatorOverrides || {custom:[], hidden:[], edits:{}};
  ov.edits = ov.edits || {};
  ov.edits[code] = fields;
  state.indicatorOverrides = ov;
  saveIndicatorOverrides();
  showToast('已更新指標內容');
}
function hideIndicator(code){
  const ov = state.indicatorOverrides || {custom:[], hidden:[], edits:{}};
  ov.hidden = (ov.hidden||[]).indexOf(code)===-1 ? (ov.hidden||[]).concat([code]) : ov.hidden;
  state.indicatorOverrides = ov;
  saveIndicatorOverrides();
  showToast('已停用此指標');
}
function restoreIndicator(code){
  const ov = state.indicatorOverrides || {custom:[], hidden:[], edits:{}};
  ov.hidden = (ov.hidden||[]).filter(function(c){ return c!==code; });
  state.indicatorOverrides = ov;
  saveIndicatorOverrides();
  showToast('已恢復此指標');
}
function deleteCustomIndicator(code){
  const ov = state.indicatorOverrides || {custom:[], hidden:[], edits:{}};
  ov.custom = (ov.custom||[]).filter(function(i){ return i.code!==code; });
  if(ov.edits) delete ov.edits[code];
  state.indicatorOverrides = ov;
  saveIndicatorOverrides();
  showToast('已刪除自訂指標');
}

function indicatorTags(ind){
  let html = '';
  if(ind.isCore) html += '<span class="tag-core">核心指標</span>';
  if(ind.isNew) html += '<span class="tag-new">新增指標</span>';
  if(ind.noScore) html += '<span class="tag-noscore">不計分</span>';
  return html ? '<div class="ind-tags">'+html+'</div>' : '';
}
function matchIndicatorCode(text){
  if(!text) return '';
  const m = text.match(/(\d{4}(-[0-9A-Za-z]+)?)/);
  return m ? m[1].toUpperCase() : '';
}
function tasksForIndicator(code){
  return state.tasks.filter(function(t){ return matchIndicatorCode(t.indicator)===code.toUpperCase(); });
}
function indicatorStatus(code){
  const c = state.indicatorChecklist[code] || {};
  return c.status || (c.checked ? '已備妥' : '未備妥'); /* 相容舊資料：舊版只有 checked 布林值 */
}
function indicatorStats(){
  const list = effectiveIndicators();
  let ready=0, notReady=0, na=0, withTask=0, coreTotal=0, coreNotReady=0;
  list.forEach(function(ind){
    const st = indicatorStatus(ind.code);
    if(st==='已備妥') ready++;
    else if(st==='不適評') na++;
    else notReady++;
    if(tasksForIndicator(ind.code).length>0) withTask++;
    if(ind.isCore){
      coreTotal++;
      if(st!=='已備妥' && st!=='不適評') coreNotReady++;
    }
  });
  const applicable = list.length - na; /* 排除不適評後的適用指標總數 */
  return {total:list.length, applicable:applicable, ready:ready, notReady:notReady, na:na, withTask:withTask, coreTotal:coreTotal, coreNotReady:coreNotReady};
}
function staffActivity(){
  /* 統計每位人員最後一次登打（任何工作項目的 log）距今天數，用於偵測久無動靜的同仁 */
  const lastByName = {};
  state.tasks.forEach(function(t){
    t.logs.forEach(function(l){
      const name = (l.author||'').replace('（主任批示）','').trim();
      if(!name) return;
      if(!lastByName[name] || l.date > lastByName[name]) lastByName[name] = l.date;
    });
  });
  const today = todayStr();
  return state.roster.map(function(r){
    const last = lastByName[r.name] || null;
    let days = null;
    if(last){
      days = Math.round((new Date(today) - new Date(last)) / 86400000);
    }
    return {name:r.name, role:r.role, last:last, days:days};
  }).sort(function(a,b){
    if(a.days===null && b.days===null) return 0;
    if(a.days===null) return -1;
    if(b.days===null) return 1;
    return b.days - a.days;
  });
}


/* ====================== 同仁總覽看板（依人員彙整手上工作與最近更新狀況） ====================== */
function staffBoardData(){
  const lastByName = {};
  state.tasks.forEach(function(t){
    t.logs.forEach(function(l){
      const name = (l.author||'').replace('（主任批示）','').trim();
      if(!name) return;
      if(!lastByName[name] || l.date > lastByName[name]) lastByName[name] = l.date;
    });
  });
  const today = todayStr();
  return state.roster.map(function(r){
    const last = lastByName[r.name] || null;
    let days = null;
    if(last){ days = Math.round((new Date(today) - new Date(last)) / 86400000); }
    const myTasks = state.tasks.filter(function(t){ return t.assignee===r.name; });
    const active = myTasks.filter(function(t){ return t.status!=='已完成'; }).sort(function(a,b){
      const ao = isOverdue(a) ? 0 : 1;
      const bo = isOverdue(b) ? 0 : 1;
      if(ao!==bo) return ao-bo;
      return (a.endDate||'9999').localeCompare(b.endDate||'9999');
    });
    return {name:r.name, role:r.role, last:last, days:days, tasks:active, doneCount: myTasks.length-active.length, totalCount: myTasks.length};
  }).sort(function(a,b){
    if(a.days===null && b.days===null) return 0;
    if(a.days===null) return -1;
    if(b.days===null) return 1;
    return b.days - a.days;
  });
}
function staffBadge(days){
  if(days===null) return {bg:'#F5E4D7', fg:'#9C4A1F', text:'■ 尚無登打紀錄'};
  if(days<=2) return {bg:'#DCEEDD', fg:'#2C6B3A', text:'● '+(days===0?'今天更新過':days+' 天前更新')};
  if(days<=6) return {bg:'#FCEFD9', fg:'#9C6B1F', text:'▲ '+days+' 天前更新'};
  return {bg:'#F5E4D7', fg:'#9C4A1F', text:'■ '+days+' 天前更新'};
}

/* ====================== 同仁自我提醒（登入時提醒自己手上太久沒更新的工作） ====================== */
function taskLastUpdateDays(t){
  if(!t.logs || t.logs.length===0) return null;
  let maxDate = t.logs[0].date;
  t.logs.forEach(function(l){ if(l.date && l.date>maxDate) maxDate = l.date; });
  return Math.round((new Date(todayStr()) - new Date(maxDate)) / 86400000);
}
function staleOwnTasks(thresholdDays){
  if(!state.currentUser) return [];
  return state.tasks.filter(function(t){
    if(t.assignee !== state.currentUser.name) return false;
    if(t.status==='已完成') return false;
    const days = taskLastUpdateDays(t);
    return days===null || days>=thresholdDays;
  });
}
function selfReminderDismissKey(){ return 'selfReminderDismiss_'+(state.currentUser?state.currentUser.email:'')+'_'+todayStr(); }
function renderSelfReminderBanner(){
  let dismissed = false;
  try{ dismissed = localStorage.getItem(selfReminderDismissKey())==='1'; }catch(e){}
  if(dismissed) return '';

    + '      <ul style="margin:0; padding-left:18px; font-size:13px; color:var(--ink-soft);">'+shown+'</ul>'

/* ====================== 每週彙總卡（彙整本週至今，誰更新了什麼、誰完全沒動靜） ====================== */
function startOfThisWeek(){
  const d = new Date(todayStr());
  const day = d.getDay(); /* 0=週日 1=週一 ... 6=週六 */
  const diffToMonday = (day===0 ? -6 : 1-day);
  d.setDate(d.getDate()+diffToMonday);
  return d.toISOString().slice(0,10);
}
function weeklyDigestData(){
  const weekStart = startOfThisWeek();
  const today = todayStr();
  return state.roster.map(function(r){
    const latestByTask = {};
    state.tasks.forEach(function(t){
      if(t.assignee !== r.name) return;
      t.logs.forEach(function(l){
        if(!l.date || l.date < weekStart || l.date > today) return;
        const key = t.id;
        if(!latestByTask[key] || l.date >= latestByTask[key].date){
          latestByTask[key] = {date:l.date, title:t.title, note:l.note||'', progress:l.progress, status:l.status};
        }
      });
    });
    const entries = Object.keys(latestByTask).map(function(k){ return latestByTask[k]; }).sort(function(a,b){ return a.date.localeCompare(b.date); });
    const completedCount = entries.filter(function(e){ return e.status==='已完成'; }).length;
    return {name:r.name, role:r.role, entries:entries, updateCount:entries.length, completedCount:completedCount};
  }).sort(function(a,b){ return a.updateCount - b.updateCount; });
}
function renderWeeklyDigest(){
  const weekStart = startOfThisWeek();
  const today = todayStr();
  const data = weeklyDigestData();
  const activeCount = data.filter(function(d){ return d.updateCount>0; }).length;

      + '      <span class="status-badge" style="background:'+badgeBg+'; color:'+badgeFg+'">'+badgeText+'</span>'

function catInfo(id){ return CATEGORIES.find(function(c){return c.id===id;}) || CATEGORIES[CATEGORIES.length-1]; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
function isOverdue(t){
  if(t.status==='已完成') return false;
  if(!t.reminderDate) return false;

}
function statusColor(s){

}

/* ====================== 日曆串接（等級①：一鍵加入Google日曆／下載通用ics檔） ====================== */
function nextDayStr(dateStr){
  const d = new Date(dateStr);
  d.setDate(d.getDate()+1);
  return d.toISOString().slice(0,10);
}
function googleCalUrl(t){
  if(!t.reminderDate) return '#';
  const start = t.reminderDate.replace(/-/g,'');
  const end = nextDayStr(t.reminderDate).replace(/-/g,'');
  const text = encodeURIComponent('【大同發展中心】'+t.title);
  const details = encodeURIComponent(
    '負責人：'+(t.assignee||'')+'\n'+
    '對應指標：'+(t.indicator||'無')+'\n'+
    '請至「大同發展中心工作管理平台」更新進度：https://renotzeng300-lang.github.io/datong-worktracker/'
  );
  return 'https://www.google.com/calendar/render?action=TEMPLATE&text='+text+'&dates='+start+'/'+end+'&details='+details;
}
function escapeIcsText(s){
  return String(s||'').replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
}
function buildIcsContent(t){
  const start = t.reminderDate.replace(/-/g,'');
  const end = nextDayStr(t.reminderDate).replace(/-/g,'');
  const stamp = todayStr().replace(/-/g,'')+'T000000Z';
  const lines = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Datong Worktracker//ZH-TW','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    'UID:datong-'+t.id+'@worktracker',
    'DTSTAMP:'+stamp,
    'DTSTART;VALUE=DATE:'+start,
    'DTEND;VALUE=DATE:'+end,
    'SUMMARY:'+escapeIcsText('【大同發展中心】'+t.title),
    'DESCRIPTION:'+escapeIcsText('負責人：'+(t.assignee||'')+'；對應指標：'+(t.indicator||'無')),
    'END:VEVENT',
    'END:VCALENDAR'
  ];
  return lines.join('\r\n');
}
function downloadIcs(t){
  const content = buildIcsContent(t);
  const blob = new Blob([content], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (t.title||'提醒').replace(/[\\/:*?"<>|]/g,'_')+'.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}
function reviewColor(s){
  if(s==='已核可') return {bg:'#DCEEDD', fg:'#2C6B3A'};
  if(s==='請補充說明') return {bg:'#F5E4D7', fg:'#9C4A1F'};
  return {bg:'#EDEAE2', fg:'#6F6A5E'};
}

async function ensureSeedData(){

    const snap = await db.collection('tasks').limit(1).get();

      const seed = seedTasks();

      seed.forEach(function(t){ batch.set(db.collection('tasks').doc(t.id), t); });

function normalizeEmail(email){ return (email||'').trim().toLowerCase(); }
function setStaffAccount(email, name, role){
  const e = normalizeEmail(email);
  if(!e || !name){ showToast('請填寫完整的 Email 與姓名', true); return Promise.reject(new Error('缺少必填欄位')); }

function friendlyAuthError(err){
  const map = {
    'auth/email-already-in-use':'此 Email 已經有帳號',
    'auth/invalid-email':'Email 格式不正確',
    'auth/weak-password':'密碼強度不足，請至少 6 個字元',
    'auth/network-request-failed':'網路連線失敗，請檢查網路後再試一次'
  };
  return map[err.code] || err.message;
}
function genRandomPassword(){
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
  let pwd = '';
  for(let i=0;i<10;i++){ pwd += chars[Math.floor(Math.random()*chars.length)]; }
  return pwd;
}
function createOrUpdateStaffAccount(email, password, name, role){
  const e = normalizeEmail(email);
  if(!e || !name) return Promise.reject(new Error('請填寫 Email 與姓名'));
  if(!password){
    return setStaffAccount(e, name, role).then(function(){ return {createdNew:false}; });
  }
  if(password.length < 6) return Promise.reject(new Error('密碼至少需要 6 個字元'));
  const secondaryName = 'staffCreator'+Date.now();
  let secondaryApp;
  try{ secondaryApp = firebase.initializeApp(FIREBASE_CONFIG, secondaryName); }
  catch(err){ return Promise.reject(new Error('系統初始化失敗：'+err.message)); }
  let createdNew = true;
  return secondaryApp.auth().createUserWithEmailAndPassword(e, password)
    .then(function(){ return secondaryApp.auth().signOut(); })
    .catch(function(err){
      if(err.code === 'auth/email-already-in-use'){ createdNew = false; return; }
      throw new Error(friendlyAuthError(err));
    })
    .then(function(){ return secondaryApp.delete().catch(function(){}); })
    .then(function(){ return setStaffAccount(e, name, role); })
    .then(function(){ return {createdNew:createdNew}; });
}

/* ====================== 衍生計算 ====================== */
function visibleTasks(scope){
  let list = state.tasks.slice();
  if(scope==='mine' && state.currentUser){
    list = list.filter(function(t){ return t.assignee===state.currentUser.name; });
  }
  if(state.filter.category!=='all'){ list = list.filter(function(t){ return t.category===state.filter.category; }); }
  if(state.filter.assignee!=='all'){ list = list.filter(function(t){ return t.assignee===state.filter.assignee; }); }
  if(state.filter.status!=='all'){ list = list.filter(function(t){ return t.status===state.filter.status; }); }
  const priorityRank = {'高':0,'中':1,'低':2};
  list.sort(function(a,b){
    const ao = isOverdue(a) ? 0 : 1;
    const bo = isOverdue(b) ? 0 : 1;
    if(ao!==bo) return ao-bo;
    const ap = priorityRank[a.priority||'中'];
    const bp = priorityRank[b.priority||'中'];
    if(ap!==bp) return ap-bp;
    return (a.endDate||'9999').localeCompare(b.endDate||'9999');
  });
  return list;
}
function computeStats(){
  const total = state.tasks.length;
  const done = state.tasks.filter(function(t){ return t.status==='已完成'; }).length;
  const inProgress = state.tasks.filter(function(t){ return t.status==='進行中'; }).length;
  const overdue = state.tasks.filter(isOverdue).length;
  return {total:total, done:done, inProgress:inProgress, overdue:overdue};
}
function categoryStats(){
  return CATEGORIES.map(function(c){
    const items = state.tasks.filter(function(t){ return t.category===c.id; });
    if(items.length===0) return {cat:c, count:0, avg:0};
    const avg = Math.round(items.reduce(function(s,t){ return s+(t.progress||0); },0)/items.length);
    return {cat:c, count:items.length, avg:avg};
  }).filter(function(x){ return x.count>0; });
}
function recentActivity(n){
  const items = [];
  state.tasks.forEach(function(t){
    t.logs.forEach(function(l){
      items.push({date:l.date, author:l.author, note:l.note, title:t.title, taskId:t.id});
    });
  });
  items.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
  return items.slice(0, n||8);
}

function findTask(id){ return state.tasks.find(function(t){ return t.id===id; }); }

function createTask(data){
  const ref = db.collection('tasks').doc();
  const t = {
    id: ref.id,
    category: data.category, title: data.title, indicator: data.indicator||'',
    assignee: data.assignee, role: data.role,
    cycle: data.cycle || defaultCycle(),
    priority: data.priority || '中',
    evidenceUrl: data.evidenceUrl || '',
    startDate: data.startDate||todayStr(), endDate: data.endDate||'',
    progress: Number(data.progress)||0, status: data.status||'未開始',
    reminderDate: data.reminderDate||'',
    reviewStatus:'待審核', directorComment:'',
    createdBy: state.currentUser ? state.currentUser.name : '未知',
    createdAt: todayStr(),
    logs: [{date:todayStr(), author: state.currentUser?state.currentUser.name:'未知', note: data.note || '建立工作項目。', progress:Number(data.progress)||0, status:data.status||'未開始'}]
  };
  addToRoster(data.assignee, data.role);
  return ref.set(t); /* 回傳 Promise，呼叫端應等待真正寫入成功後才關閉視窗／清除草稿，避免使用者過早重新整理導致資料遺失 */
}
function defaultCycle(){
  /* 預設帶入民國年度，方便標記評鑑梯次，例如 2026 -> 115年度 */
  const y = new Date().getFullYear() - 1911;
  return y + '年度';
}
function addLog(taskId, note, progress, status){
  const t = findTask(taskId); if(!t) return Promise.reject(new Error('找不到工作項目'));
  const logEntry = {id: genId(), date:todayStr(), author: state.currentUser?state.currentUser.name:'未知', note:note, progress:Number(progress), status:status};
  const newReviewStatus = (status==='已完成' && t.reviewStatus!=='已核可') ? '待審核' : t.reviewStatus;
  return db.collection('tasks').doc(taskId).update({
    progress: Number(progress),
    status: status,
    reviewStatus: newReviewStatus,
    logs: firebase.firestore.FieldValue.arrayUnion(logEntry)
  });
}
function editLog(taskId, idx, note, progress, status){
  const t = findTask(taskId); if(!t) return Promise.reject(new Error('找不到工作項目'));
  const original = t.logs[idx];
  if(!original) return Promise.reject(new Error('找不到這筆紀錄，可能畫面尚未更新，請重新整理後再試一次'));
  if(original.author !== state.currentUser.name){
    return Promise.reject(new Error('只能修改自己登打的紀錄'));
  }
  const newLogs = t.logs.slice();
  newLogs[idx] = Object.assign({}, original, {
    note: note, progress: Number(progress), status: status,
    edited: true, editedAt: todayStr()
  });
  const updateData = { logs: newLogs };
  /* 如果修改的是「最新一筆」紀錄，連帶同步工作項目目前顯示的進度／狀態，避免跟歷史紀錄不一致 */
  if(idx === t.logs.length-1){
    updateData.progress = Number(progress);
    updateData.status = status;
  }
  return db.collection('tasks').doc(taskId).update(updateData);
}

function render(){
  const app = document.getElementById('app');

  if(!state.firebaseUser){
    app.innerHTML = renderLoginScreen();
    bindLoginScreen();
    return;
  }

  const profile = state.staffDirectory[normalizeEmail(state.firebaseUser.email)];
  if(profile){
    state.currentUser = {name: profile.name, role: profile.role, email: state.firebaseUser.email};
  }else{
    state.currentUser = null;
  }

  if(!state.currentUser){
    const directoryEmpty = Object.keys(state.staffDirectory).length===0;
    if(directoryEmpty){
      app.innerHTML = renderBootstrapScreen();
      bindBootstrapScreen();
    }else{
      app.innerHTML = renderNoProfileScreen();
      bindNoProfileScreen();
    }
    return;
  }

  app.innerHTML = renderHeader() + renderTabsAndBody();
  bindGlobalEvents();
  /* 注意：「新增工作」視窗是獨立附加在 <body> 上的浮層，
     由按鈕點擊直接開啟/關閉，不受這裡的畫面重繪影響，
     絕不可在這裡重新呼叫 showNewTaskModal()，
     否則背景的即時資料同步會把使用者正在填寫的內容整個換成空白新視窗。 */
}

function renderLoginScreen(){
  return ''
  + '<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">'
  + '  <div class="modal" style="max-width:420px;">'
  + '    <div class="modal-head"><h2>大同發展中心工作管理平台</h2><p>請使用機構配發的帳號登入</p></div>'
  + '    <div class="modal-body">'
  + '      <div class="field-block"><label class="field-label">Email</label><input class="full" type="email" id="login-email" placeholder="例如：staff01@gmail.com" autocomplete="username"></div>'
  + '      <div class="field-block"><label class="field-label">密碼</label><input class="full" type="password" id="login-password" placeholder="請輸入密碼" autocomplete="current-password"></div>'
  + '      <div class="small-note" id="login-error" style="color:var(--warn); margin-top:4px;"></div>'
  + '      <div class="small-note" style="margin-top:10px;"><a href="#" id="forgot-password-link">忘記密碼？</a></div>'
  + '    </div>'
  + '    <div class="modal-foot"><button class="btn btn-primary" id="login-submit">登入</button></div>'
  + '  </div>'
  + '</div>';
}
const FIREBASE_AUTH_ERROR_MAP = {
  'auth/invalid-email':'Email 格式不正確',
  'auth/user-disabled':'此帳號已被停用',
  'auth/user-not-found':'帳號或密碼錯誤',
  'auth/wrong-password':'帳號或密碼錯誤',
  'auth/invalid-credential':'帳號或密碼錯誤',
  'auth/too-many-requests':'嘗試次數過多，請稍後再試',
  'auth/network-request-failed':'網路連線異常，請檢查網路後再試一次'
};
function translateAuthError(err){
  return FIREBASE_AUTH_ERROR_MAP[err.code] || ('登入失敗：'+err.message);
}
function bindLoginScreen(){
  function doLogin(){
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if(!email || !password){ errEl.textContent = '請輸入 Email 與密碼'; return; }
    const submitBtn = document.getElementById('login-submit');
    submitBtn.disabled = true; submitBtn.textContent = '登入中…';
    firebase.auth().signInWithEmailAndPassword(email, password).catch(function(err){
      submitBtn.disabled = false; submitBtn.textContent = '登入';
      errEl.textContent = translateAuthError(err);
    });
  }
  document.getElementById('login-submit').addEventListener('click', doLogin);
  document.getElementById('login-password').addEventListener('keydown', function(e){ if(e.key==='Enter'){ doLogin(); } });
  document.getElementById('forgot-password-link').addEventListener('click', function(e){
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    if(!email){ document.getElementById('login-error').textContent = '請先在上方輸入您的 Email，再點忘記密碼'; return; }
    firebase.auth().sendPasswordResetEmail(email).then(function(){
      showToast('重設密碼信已寄出，請查收信箱');
    }).catch(function(err){
      document.getElementById('login-error').textContent = translateAuthError(err);
    });
  });
}

function renderTabsAndBody(){
  const isDirector = state.currentUser.role==='主任';
  const reviewCount = state.tasks.filter(function(t){
    return t.reviewStatus==='待審核' || isOverdue(t);
  }).length;

  let tabsHtml = '<div class="tabs">'
    + tabBtn('overview','總覽')
    + tabBtn('mine','我的工作')
    + tabBtn('all','全部工作')
    + tabBtn('indicators','指標對照表');
  if(isDirector){
    tabsHtml += tabBtn('staffBoard','同仁總覽');
    tabsHtml += tabBtn('weeklyDigest','每週彙總');
    tabsHtml += tabBtn('review','審核與提醒', reviewCount);
    tabsHtml += tabBtn('indManage','指標管理');
    tabsHtml += tabBtn('staffManage','人員帳號管理');
    tabsHtml += tabBtn('trash','資源回收桶', (state.deletedTasks||[]).length || null);
  }
  tabsHtml += '</div>';

  let body = '';
  if(state.activeTab==='overview') body = renderOverview();
  else if(state.activeTab==='mine') body = renderTaskListPanel('mine');
  else if(state.activeTab==='all') body = renderTaskListPanel('all');
  else if(state.activeTab==='indicators') body = renderIndicatorPanel();
  else if(state.activeTab==='staffBoard' && isDirector) body = renderStaffBoard();
  else if(state.activeTab==='weeklyDigest' && isDirector) body = renderWeeklyDigest();
  else if(state.activeTab==='review' && isDirector) body = renderReviewPanel();
  else if(state.activeTab==='indManage' && isDirector) body = renderIndicatorManagePanel();
  else if(state.activeTab==='staffManage' && isDirector) body = renderStaffManagePanel();
  else if(state.activeTab==='trash' && isDirector) body = renderTrashPanel();

  return '<div class="container">' + renderSelfReminderBanner() + tabsHtml + body + '</div>';
}

function renderTaskCard(t){
  const cat = catInfo(t.category);
  const open = state.openTaskId===t.id;
  const sc = statusColor(t.status);
  const circumference = 113.1;
  const offset = circumference * (1 - (t.progress||0)/100);
  const overdue = isOverdue(t);
  const isDirector = state.currentUser.role==='主任';
  const canEdit = isDirector || t.assignee===state.currentUser.name;
  const priority = t.priority || '中';

  let head = '<div class="task-head" data-action="toggle-task" data-id="'+t.id+'">'
    + '<div class="cat-stripe" style="background:'+cat.color+'"></div>'
    + '<div class="ring-wrap">'
    +   '<svg width="44" height="44" viewBox="0 0 44 44">'
    +     '<circle cx="22" cy="22" r="18" fill="none" stroke="#EFEAE0" stroke-width="4"></circle>'
    +     '<circle cx="22" cy="22" r="18" fill="none" stroke="'+cat.color+'" stroke-width="4" stroke-linecap="round" stroke-dasharray="'+circumference+'" stroke-dashoffset="'+offset+'" transform="rotate(-90 22 22)"></circle>'
    +   '</svg>'
    +   '<div class="ring-pct">'+(t.progress||0)+'%</div>'
    + '</div>'
    + '<div class="task-main">'
    +   '<div class="task-title-row">'
    +     '<span class="task-title">'+escapeHtml(t.title)+'</span>'
    +     (t.indicator? '<span class="cat-badge" style="background:'+cat.soft+'; color:'+cat.color+'">'+escapeHtml(t.indicator)+'</span>' : '')
    +     '<span class="priority-badge priority-'+priority+'">優先：'+priority+'</span>'
    +     (t.cycle? '<span class="cycle-tag">'+escapeHtml(t.cycle)+'</span>' : '')
    +   '</div>'
    +   '<div class="task-meta">'
    +     '<span>👤 '+escapeHtml(t.assignee)+'（'+escapeHtml(t.role)+'）</span>'
    +     '<span>🗓 '+ (t.startDate||'—') +' ～ '+ (t.endDate||'未定') +'</span>'
    +     (t.reminderDate? '<span>⏰ 提醒：'+t.reminderDate+'</span>' : '')
    +     (t.evidenceUrl? '<span>🔗 <a href="'+escapeHtml(t.evidenceUrl)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">佐證資料</a></span>' : '')
    +   '</div>'
    + '</div>'
    + (overdue? '<span class="overdue-flag">逾期待辦</span>' : '')

    + '<span class="status-badge" style="background:'+sc.bg+'; color:'+sc.fg+'">'+t.status+'</span>'
    + '<span class="chev">▶</span>'
    + '</div>';

  let body = '<div class="task-body"><div class="body-grid">';

  // 左：執行紀錄
  body += '<div>'
    + '<label class="field-label">執行情形紀錄</label>'
    + '<div class="log-list">'
    +   t.logs.map(function(l, idx){ return {l:l, idx:idx}; }).slice().reverse().map(function(o){ return renderLogEntry(t, o.l, o.idx); }).join('')
    + '</div>';
  if(canEdit){
    let draftNote = '';
    try{ draftNote = localStorage.getItem('dt-log-draft-'+t.id) || ''; }catch(e){}
    body += '<form data-action="add-log" data-id="'+t.id+'">'
      + '<div class="field-block"><label class="field-label">登打本次執行說明</label><textarea name="note" class="log-draft-input" data-task-id="'+t.id+'" placeholder="說明本次進度、遇到的問題或已完成事項…" required>'+escapeHtml(draftNote)+'</textarea></div>'
      + '<div class="row-2">'
      +   '<div class="field-block"><label class="field-label">最新進度（%）</label><input class="full" type="number" name="progress" min="0" max="100" step="5" value="'+(t.progress||0)+'"></div>'
      +   '<div class="field-block"><label class="field-label">狀態</label><select class="full" name="status">'+STATUSES.map(function(s){ return '<option value="'+s+'"'+(t.status===s?' selected':'')+'>'+s+'</option>'; }).join('')+'</select></div>'
      + '</div>'
      + '<button class="btn btn-primary btn-sm" type="submit">送出更新</button>'
      + '</form>';
  } else {
    body += '<div class="small-note">僅負責人或主任可登打此項目的執行進度。</div>';
  }
  body += '</div>';

  // 右：主任批改 / 提醒設定 / 優先順序 / 佐證資料
  body += '<div>';

    body += '<div style="margin-bottom:14px; display:flex; gap:8px; flex-wrap:wrap;">'

      + '<button class="btn btn-sm" type="button" data-action="download-ics" data-id="'+t.id+'">⬇️ 下載 .ics（Outlook／手機日曆通用）</button>'
      + '</div>';

  if(isDirector){
    body += '<div class="director-box">'
      + '<label class="field-label">主任批改</label>'
      + '<form data-action="review-task" data-id="'+t.id+'">'

function linkedCellHtml(code){
  const linked = tasksForIndicator(code);
  if(linked.length===0) return '<span class="small-note">尚無對應工作項目</span>';
  const names = linked.slice(0,2).map(function(t){ return escapeHtml(t.title); }).join('、');
  const more = linked.length>2 ? '　等共'+linked.length+'項' : '';
  return '<div>'+names+more+'</div>';
}
function renderIndicatorPanel(){
  const stats = indicatorStats();
  let html = '';

  if(stats.coreNotReady>0){
    html += '<div class="core-warning">⚠️ 核心指標尚有 '+stats.coreNotReady+' 項未達「已備妥」——核心指標未達滿分將導致評鑑等第降一等，請優先處理。</div>';
  }

  html += '<div class="stat-grid">'
    + statCard(stats.applicable,'適用指標數（已排除不適評）','')
    + statCard(stats.ready+'/'+stats.applicable,'資料已備妥','good')
    + statCard(stats.na,'標記不適評','')
    + statCard(stats.coreTotal-stats.coreNotReady+'/'+stats.coreTotal,'核心指標達成','warn')
    + '</div>';

  html += '<div class="filter-bar">'
    + '<select data-action="ind-filter-category">'
    +   '<option value="all">全部評鑑面向</option>'
    +   CATEGORIES.map(function(c){ return '<option value="'+c.id+'"'+(state.indFilter.category===c.id?' selected':'')+'>'+c.label+'</option>'; }).join('')
    + '</select>'
    + '<select data-action="ind-filter-readiness">'
    +   '<option value="all">全部狀態</option>'
    +   '<option value="ready"'+(state.indFilter.readiness==='ready'?' selected':'')+'>已備妥</option>'
    +   '<option value="notReady"'+(state.indFilter.readiness==='notReady'?' selected':'')+'>尚未備妥</option>'
    +   '<option value="na"'+(state.indFilter.readiness==='na'?' selected':'')+'>不適評</option>'
    +   '<option value="hasTask"'+(state.indFilter.readiness==='hasTask'?' selected':'')+'>已有對應工作項目</option>'
    +   '<option value="noTask"'+(state.indFilter.readiness==='noTask'?' selected':'')+'>尚無對應工作項目</option>'
    + '</select>'
    + '<label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);"><input type="checkbox" id="ind-core-only" '+(state.indFilter.core?'checked':'')+'> 只看核心指標</label>'
    + '<div class="spacer"></div>'
    + '<div class="small-note" style="max-width:260px;text-align:right;">「不適評」指機構此項免評（如服務型態不適用），不計入備妥率分母</div>'
    + '</div>';

  let anyGroup = false;
  CATEGORIES.forEach(function(cat){
    if(state.indFilter.category!=='all' && cat.id!==state.indFilter.category) return;
    let items = effectiveIndicators().filter(function(ind){ return ind.category===cat.id; });
    if(state.indFilter.core) items = items.filter(function(ind){ return ind.isCore; });
    items = items.filter(function(ind){
      const st = indicatorStatus(ind.code);
      const hasTask = tasksForIndicator(ind.code).length>0;
      if(state.indFilter.readiness==='ready') return st==='已備妥';
      if(state.indFilter.readiness==='notReady') return st==='未備妥';
      if(state.indFilter.readiness==='na') return st==='不適評';
      if(state.indFilter.readiness==='hasTask') return hasTask;
      if(state.indFilter.readiness==='noTask') return !hasTask;
      return true;
    });
    if(items.length===0) return;
    anyGroup = true;
    html += '<div class="ind-group">'
      + '<div class="ind-group-title"><span class="dot" style="background:'+cat.color+'"></span>'+cat.label+'（'+items.length+' 項）</div>'
      + '<table class="ind-table"><thead><tr>'
      +   '<th style="width:110px;">備妥狀態</th><th style="width:90px;">指標編號</th><th>指標名稱</th><th style="width:180px;">對應工作項目</th><th style="width:190px;">備註</th><th style="width:150px;">佐證資料連結</th><th style="width:96px;">操作</th>'
      + '</tr></thead><tbody>'
      +   items.map(function(ind){
            const c = state.indicatorChecklist[ind.code] || {};
            const st = indicatorStatus(ind.code);
            return '<tr>'
              + '<td data-label="備妥狀態"><select class="ind-status" data-action="ind-status" data-code="'+ind.code+'">'
              +   ['未備妥','已備妥','不適評'].map(function(s){ return '<option value="'+s+'"'+(st===s?' selected':'')+'>'+s+'</option>'; }).join('')
              + '</select></td>'
              + '<td data-label="指標編號" class="ind-code">'+ind.code+'</td>'
              + '<td data-label="指標名稱">'+escapeHtml(ind.title)+indicatorTags(ind)+'</td>'
              + '<td data-label="對應工作項目">'+linkedCellHtml(ind.code)+'</td>'
              + '<td data-label="備註"><textarea class="ind-note" data-action="ind-note" data-code="'+ind.code+'" placeholder="備註說明…">'+escapeHtml(c.note||'')+'</textarea></td>'
              + '<td data-label="佐證資料連結"><input type="text" class="ind-evidence" data-action="ind-evidence" data-code="'+ind.code+'" value="'+escapeHtml(c.evidenceUrl||'')+'" placeholder="貼上雲端硬碟連結…">'
              +   (c.evidenceUrl ? '<div style="margin-top:4px;"><a href="'+escapeHtml(c.evidenceUrl)+'" target="_blank" rel="noopener">🔗 開啟資料</a></div>' : '')
              + '</td>'
              + '<td data-label="操作"><button class="btn btn-sm" data-action="ind-new-task" data-code="'+ind.code+'">＋建立工作</button></td>'
              + '</tr>';
          }).join('')
      + '</tbody></table>'
      + '</div>';
  });
  if(!anyGroup){
    html += '<div class="panel"><div class="empty"><div class="big">🔍</div>找不到符合篩選條件的指標。</div></div>';
  }
  return html;
}

function showEditIndicatorModal(code){
  const ov = state.indicatorOverrides || {custom:[], hidden:[], edits:{}};
  const baseInd = INDICATORS.concat(ov.custom||[]).find(function(i){ return i.code===code; });
  if(!baseInd) return;
  const e = (ov.edits||{})[code];
  const ind = e ? Object.assign({}, baseInd, e) : baseInd;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'edit-indicator-overlay';
  overlay.innerHTML = ''
    + '<div class="modal">'
    + '  <div class="modal-head"><h2>編輯指標：'+ind.code+'</h2></div>'
    + '  <div class="modal-body">'
    + '    <form id="edit-indicator-form">'
    + '      <div class="field-block"><label class="field-label">評鑑面向</label><select class="full" name="category">'+CATEGORIES.map(function(c){ return '<option value="'+c.id+'"'+(ind.category===c.id?' selected':'')+'>'+c.label+'</option>'; }).join('')+'</select></div>'
    + '      <div class="field-block"><label class="field-label">指標名稱</label><input class="full" type="text" name="title" value="'+escapeHtml(ind.title)+'" required></div>'
    + '      <div class="row-2" style="gap:18px;">'
    + '        <label style="display:flex;align-items:center;gap:6px;font-size:13px;"><input type="checkbox" name="isCore" '+(ind.isCore?'checked':'')+'> 核心指標</label>'
    + '        <label style="display:flex;align-items:center;gap:6px;font-size:13px;"><input type="checkbox" name="isNew" '+(ind.isNew?'checked':'')+'> 新增指標</label>'
    + '        <label style="display:flex;align-items:center;gap:6px;font-size:13px;"><input type="checkbox" name="noScore" '+(ind.noScore?'checked':'')+'> 不計分</label>'
    + '      </div>'
    + '    </form>'
    + '  </div>'
    + '  <div class="modal-foot"><button class="btn" id="edit-indicator-cancel">取消</button><button class="btn btn-primary" id="edit-indicator-submit">儲存</button></div>'
    + '</div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(ev){ if(ev.target===overlay){ overlay.remove(); } });
  document.getElementById('edit-indicator-cancel').addEventListener('click', function(){ overlay.remove(); });
  document.getElementById('edit-indicator-submit').addEventListener('click', function(){
    const form = document.getElementById('edit-indicator-form');
    if(!form.checkValidity()){ form.reportValidity(); return; }
    const fd = new FormData(form);
    editIndicator(code, {
      category: fd.get('category'), title: fd.get('title'),
      isCore: fd.get('isCore')==='on', isNew: fd.get('isNew')==='on', noScore: fd.get('noScore')==='on'
    });
    overlay.remove();
    render();
  });
}

    if(assigneeName && knownNames.indexOf(assigneeName)===-1){

    submitBtn.textContent = '儲存中…請稍候，完成前請勿關閉或重新整理';
    state.saving = true;
    const slowNoticeId = setTimeout(function(){
      submitBtn.textContent = '仍在嘗試上傳…網路連線較慢，請耐心等候（請勿關閉視窗）';
    }, 8000);
    const fd = new FormData(form);
    createTask({
      title: fd.get('title'), category: fd.get('category'), indicator: fd.get('indicator'),
      assignee: fd.get('assignee'), role: fd.get('role'),
      cycle: fd.get('cycle'), priority: fd.get('priority'), evidenceUrl: fd.get('evidenceUrl'),
      startDate: fd.get('startDate'), endDate: fd.get('endDate'),
      progress: fd.get('progress'), status: fd.get('status'),
      reminderDate: fd.get('reminderDate'), note: fd.get('note')
    }).then(function(){
      clearTimeout(slowNoticeId);
      state.saving = false;

      closeNewTaskModal();
      showToast('已新增工作項目（已確認儲存於雲端）');
      render();

      clearTimeout(slowNoticeId);
      state.saving = false;
      submitBtn.disabled = false;
      submitBtn.textContent = '新增';
      showToast('新增失敗，請檢查網路後再試一次：'+err.message, true);
    });
  });
}

/* ====================== 匯出報表 ====================== */
function exportReport(){
  if(typeof XLSX==='undefined'){
    showToast('匯出元件尚在載入，請稍候幾秒再試一次', true);
    return;
  }
  try{
    const wb = XLSX.utils.book_new();

    const taskRows = state.tasks.map(function(t){
      const lastLog = t.logs[t.logs.length-1] || {};
      return {
        '評鑑梯次': t.cycle||'',
        '優先順序': t.priority||'中',
        '評鑑面向': catInfo(t.category).label,
        '對應指標': t.indicator||'',
        '工作項目': t.title,
        '負責人': t.assignee,
        '角色': t.role,
        '開始日期': t.startDate||'',
        '預計完成日期': t.endDate||'',
        '進度(%)': t.progress,
        '狀態': t.status,
        '主任批示': t.reviewStatus,
        '主任備註': t.directorComment||'',
        '提醒日期': t.reminderDate||'',
        '佐證資料連結': t.evidenceUrl||'',
        '最新執行說明': lastLog.note||'',
        '最新更新日期': lastLog.date||'',
        '建立人': t.createdBy,
        '建立日期': t.createdAt
      };
    });
    const ws1 = XLSX.utils.json_to_sheet(taskRows.length?taskRows:[{'提示':'目前尚無工作項目'}]);
    XLSX.utils.book_append_sheet(wb, ws1, '工作項目清單');

    const indRows = effectiveIndicators().map(function(ind){
      const c = state.indicatorChecklist[ind.code] || {};
      const linked = tasksForIndicator(ind.code);
      return {
        '指標編號': ind.code,
        '評鑑面向': catInfo(ind.category).label,
        '指標名稱': ind.title,
        '標籤': [ind.isCore?'核心指標':'', ind.isNew?'新增指標':'', ind.noScore?'不計分':''].filter(Boolean).join('、'),
        '備妥狀態': indicatorStatus(ind.code),
        '對應工作項目數': linked.length,
        '對應工作項目': linked.map(function(t){ return t.title; }).join('；'),
        '佐證資料連結': c.evidenceUrl||'',
        '備註': c.note||''
      };
    });
    const ws2 = XLSX.utils.json_to_sheet(indRows);
    XLSX.utils.book_append_sheet(wb, ws2, '指標對照表');

    const catRows = categoryStats().map(function(c){
      return {'評鑑面向':c.cat.label, '工作項目數':c.count, '平均進度(%)':c.avg};
    });
    const ws3 = XLSX.utils.json_to_sheet(catRows.length?catRows:[{'評鑑面向':'尚無資料','工作項目數':0,'平均進度(%)':0}]);
    XLSX.utils.book_append_sheet(wb, ws3, '各面向進度彙總');

    XLSX.writeFile(wb, '大同發展中心工作管理報表_'+todayStr()+'.xlsx');
    showToast('已匯出報表');
  }catch(e){
    showToast('匯出失敗，請再試一次', true);
  }
}

  document.querySelectorAll('[data-action="permadelete-task"]').forEach(function(btn){
    btn.addEventListener('click', function(){
      if(confirm('確定要永久刪除這個工作項目嗎？永久刪除後將無法復原，所有歷史登打紀錄也會一併消失。')){
        permanentlyDeleteTask(btn.getAttribute('data-id'));
      }
    });
  });

  const addIndForm = document.getElementById('add-indicator-form');
  if(addIndForm){
    addIndForm.addEventListener('submit', function(e){
      e.preventDefault();
      const fd = new FormData(addIndForm);
      const ok = addCustomIndicator({
        code: fd.get('code'), category: fd.get('category'), title: fd.get('title'),
        isCore: fd.get('isCore')==='on', isNew: fd.get('isNew')==='on', noScore: fd.get('noScore')==='on'
      });
      if(ok){ addIndForm.reset(); }
    });
  }
  document.querySelectorAll('[data-action="ind-edit-open"]').forEach(function(btn){
    btn.addEventListener('click', function(){ showEditIndicatorModal(btn.getAttribute('data-code')); });
  });
  document.querySelectorAll('[data-action="ind-hide"]').forEach(function(btn){
    btn.addEventListener('click', function(){
      if(confirm('停用此指標後，「指標對照表」將不再顯示此項，但既有的工作項目資料不會被刪除。確定要停用嗎？')){
        hideIndicator(btn.getAttribute('data-code'));
      }
    });
  });
  document.querySelectorAll('[data-action="ind-restore"]').forEach(function(btn){
    btn.addEventListener('click', function(){ restoreIndicator(btn.getAttribute('data-code')); });
  });
  document.querySelectorAll('[data-action="ind-delete-custom"]').forEach(function(btn){
    btn.addEventListener('click', function(){
      if(confirm('確定要永久刪除這個自訂指標項目嗎？此動作無法復原。')){
        deleteCustomIndicator(btn.getAttribute('data-code'));
      }
    });
  });

  const addStaffForm = document.getElementById('add-staff-form');
  if(addStaffForm){
    const genBtn = document.getElementById('gen-password-btn');
    if(genBtn) genBtn.addEventListener('click', function(){
      document.getElementById('new-staff-password').value = genRandomPassword();
    });
    addStaffForm.addEventListener('submit', function(e){
      e.preventDefault();
      const fd = new FormData(addStaffForm);
      const email = fd.get('email'), name = fd.get('name'), role = fd.get('role'), password = (fd.get('password')||'').trim();
      const submitBtn = addStaffForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true; submitBtn.textContent = '處理中…';
      createOrUpdateStaffAccount(email, password, name, role).then(function(result){
        if(result.createdNew){
          showToast('已建立新帳號並設定姓名／角色！請把 Email「'+email+'」與密碼複製給新同仁。');
        }else{
          showToast('已更新姓名／角色對照（此 Email 原本就有帳號，密碼未變動）');
        }
        addStaffForm.reset();
        submitBtn.disabled = false; submitBtn.textContent = '建立／更新帳號';
        render();
      }).catch(function(err){
        submitBtn.disabled = false; submitBtn.textContent = '建立／更新帳號';
        showToast('儲存失敗：'+err.message, true);
      });
    });
  }
  document.querySelectorAll('[data-action="staff-remove"]').forEach(function(btn){
    btn.addEventListener('click', function(){
      const email = btn.getAttribute('data-email');
      if(email===normalizeEmail(state.firebaseUser.email)){
        showToast('不能移除您自己目前登入中的帳號設定', true);
        return;
      }
      const personName = state.staffDirectory[email] ? state.staffDirectory[email].name : null;
      const unfinished = personName ? state.tasks.filter(function(t){ return t.assignee===personName && t.status!=='已完成'; }) : [];
      if(unfinished.length>0){
        showReassignBeforeRemoveModal(email, personName, unfinished);
        return;
      }
      if(confirm('確定要移除「'+email+'」這個帳號的人員設定嗎？（不會刪除 Firebase 登入帳號本身，只移除姓名/角色對照）')){
        removeStaffAccount(email);
      }
    });
  });
}

/* ====================== 啟動流程 ====================== */
function renderSetupNeededScreen(){
  document.getElementById('app').innerHTML = ''
    + '<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">'
    + '<div class="modal" style="max-width:540px;">'
    + '  <div class="modal-head"><h2>尚未完成雲端設定</h2>'
    + '  <p>請依照「Firebase設定教學」文件申請好 Firebase 專案後，把這個檔案最上方設定區塊裡的 <b>FIREBASE_CONFIG</b> 換成您自己專案的金鑰，存檔後重新整理頁面即可。</p></div>'
    + '</div></div>';
}
function startApp(){
  document.getElementById('app').innerHTML = '<div class="empty">連線中…</div>';

  if(typeof firebase==='undefined'){
    document.getElementById('app').innerHTML = '<div class="empty">Firebase 程式庫載入失敗。<br><span class="small-note">這通常是瀏覽器擴充功能（如廣告或追蹤封鎖工具）、防毒軟體，或公司／機關網路擋掉了 www.gstatic.com 這個網域所造成。請嘗試：①暫時關閉廣告封鎖類擴充功能後重新整理頁面 ②換成手機行動網路或家用網路測試 ③換一台電腦或瀏覽器測試，確認是否與環境有關。</span></div>';
    return;
  }

  let settled = false;
  const timeoutId = setTimeout(function(){
    if(!settled){
      document.getElementById('app').innerHTML = '<div class="empty">連線逾時，伺服器沒有回應。<br><span class="small-note">請檢查網路連線是否正常，或是否有防火牆／公司網路阻擋了 Google Firebase 的連線（firebaseapp.com / googleapis.com / gstatic.com）。可以按 F12 開啟瀏覽器的「Console」分頁，查看是否有紅色錯誤訊息，並回報給系統管理人員協助排查。</span><br><button class="btn btn-sm" style="margin-top:10px;" onclick="location.reload()">重新整理頁面</button></div>';
    }
  }, 10000);

  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    const authRef = firebase.auth();
    db = firebase.firestore();
    try{
      db.settings({ experimentalForceLongPolling: true, useFetchStreams: false });
    }catch(e){ /* 若此 SDK 版本不支援該設定，略過即可，不影響其他功能 */ }
    authRef.onAuthStateChanged(function(user){
      settled = true;
      clearTimeout(timeoutId);
      if(user){
        if(!user.email){
          firebase.auth().signOut().then(function(){
            document.getElementById('app').innerHTML = '<div class="empty">⚠️ 偵測到登入狀態異常（找不到對應的 Email，可能是舊版「通行碼登入」殘留在此瀏覽器中）。<br>系統已自動將您登出，請重新整理頁面後，改用 Email／密碼重新登入。<br><span class="small-note">如果重新整理、重新登入後仍出現這個訊息，請按 F12 開啟「Console」分頁截圖，回報給系統管理人員協助排查。</span><br><button class="btn btn-sm" style="margin-top:10px;" onclick="location.reload()">重新整理頁面</button></div>';
          });
          return;
        }
        state.firebaseUser = {email: user.email, uid: user.uid};
        document.getElementById('app').innerHTML = '<div class="empty">登入成功，正在連接資料庫…</div>';
        let dataSettled = false;
        const dataTimeoutId = setTimeout(function(){
          if(!dataSettled){
            document.getElementById('app').innerHTML = '<div class="empty">身分驗證成功，但資料庫連線逾時（已等待 20 秒）。<br><span class="small-note">請按 F12 開啟「Console」分頁，查看是否有紅色錯誤訊息（特別留意 code 後面的數字），並截圖回報以便進一步排查。也可以先按下方按鈕重新整理一次。</span><br><button class="btn btn-sm" style="margin-top:10px;" onclick="location.reload()">重新整理頁面</button></div>';
          }
        }, 20000);
        try{
          attachListeners();
          render();
          dataSettled = true;
          clearTimeout(dataTimeoutId);
        }catch(err){
          dataSettled = true;
          clearTimeout(dataTimeoutId);
          document.getElementById('app').innerHTML = '<div class="empty">畫面初始化失敗：'+escapeHtml(err.message)+'</div>';
        }
        /* 種子資料（範例工作項目／指標清單）在背景建立，不阻擋畫面顯示 */
        ensureSeedData().catch(function(err){ showToast('初始種子資料建立失敗：'+err.message, true); });
      }else{
        state.firebaseUser = null;
        render();
      }
    }, function(err){
      settled = true;
      clearTimeout(timeoutId);
      document.getElementById('app').innerHTML = '<div class="empty">驗證連線失敗：'+escapeHtml(err.message)+'</div>';
    });
  }catch(e){
    settled = true;
    clearTimeout(timeoutId);
    document.getElementById('app').innerHTML = '<div class="empty">Firebase 初始化失敗：'+escapeHtml(e.message)+'<br><span class="small-note">請確認檔案最上方 FIREBASE_CONFIG 裡六個欄位的值都已正確填入。</span></div>';
  }
}
function boot(){
  if(isPlaceholderConfig()){ renderSetupNeededScreen(); return; }
  startApp();
}
window.addEventListener('unhandledrejection', function(event){
  try{
    const reason = event.reason || {};
    const reqInfo = reason.reqInfo;
    /* 過濾掉瀏覽器擴充功能（如 AI 助手類擴充功能）自身呼叫失敗產生的雜訊，
       這類錯誤的 reqInfo.pathPrefix 不會是 Firebase/Firestore 的路徑格式，
       只在看起來像是 firebase 相關錯誤時才提示，避免誤導排查方向。 */
    if(reqInfo && reqInfo.pathPrefix){ return; } /* 非 Firebase 格式，視為擴充功能雜訊，忽略 */
    const looksFirebaseRelated = (reason.code && String(reason.code).indexOf('firestore')!==-1)
      || (reason.name==='FirebaseError')
      || (reason.message && /firestore|firebase/i.test(reason.message));
    if(!looksFirebaseRelated) return;
    const msg = (reason.message || reason.code) ? (reason.code? '['+reason.code+'] ':'')+(reason.message||'') : '未知錯誤';
    showToast('系統偵測到未處理的錯誤：'+msg, true);
  }catch(e){}
});
window.addEventListener('beforeunload', function(e){
  if(state.saving){
    e.preventDefault();
    e.returnValue = '';
    return '';
  }
});
boot();
</script>
